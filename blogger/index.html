<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubhLabh News - समाचार पोर्टल</title>
    
    <meta property="og:type" content="article" />
    <meta property="og:site_name" content="SubhLabh News" />
    <meta id="og-title" property="og:title" content="SubhLabh News - समाचार पोर्टल" />
    <meta id="og-description" property="og:description" content="नेपाल र विश्वभरका ताजा अपडेटका लागि सुभलाभ न्यूज।" />
    <meta id="og-image" property="og:image" content="https://blogger.googleusercontent.com/img/a/AVvXsEgYs0647clgoWQC3ORQwtqpad0VDIrBI79h63NovgIKr29srh_C19HJk7OCbTquzxfofL7huTIp7wDCgE9W9fo_cmqE31j8GIm9B6ePJZU1pAEa5pnfTl7aB27FJjw7Vo8gk0327lNtNrurlgqSpRwSRRQIpC4gVvN9KdgtsDoXDYM8ZdfNB-IYHSmiaw=s1600" />
    <meta id="og-url" property="og:url" content="" />
    
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />

    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700&display=swap" rel="stylesheet">
    <link href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css' rel='stylesheet'/>
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/gh/designers2077/code/header-2.css'/>

    <style>
        :root { --primary: #e31e24; --dark: #1a1a1a; --gray: #666; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Mukta', sans-serif; background: var(--bg); margin: 0; color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; }
        .container { max-width: 1200px; margin: auto; padding: 0 15px; width: 100%; box-sizing: border-box; }
        #main-content { margin-top: 20px; flex: 1; padding-bottom: 50px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: var(--white); border-radius: 4px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; height: 100%; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .card-body { padding: 15px; flex-grow: 1; }
        .card-title { font-size: 19px; font-weight: 700; margin: 10px 0; line-height: 1.4; color: #111; }
        .post-date { color: var(--gray); font-size: 13px; }
        .post-layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        .post-header h1 { font-size: clamp(24px, 5vw, 36px); line-height: 1.3; margin-bottom: 20px; font-weight: 700; color: #000; }
        .post-meta-wrapper { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 15px 0; margin-bottom: 25px; }
        .author-info { display: flex; align-items: center; gap: 12px; }
        .author-img { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .share-icons { display: flex; gap: 8px; }
        .share-btn { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; text-decoration: none; font-size: 15px; border: none; cursor: pointer; }
        .bg-fb { background: #3b5998; } .bg-wa { background: #25d366; } .bg-tw { background: #1DA1F2; }
        .featured-image { width: 100%; max-height: 550px; object-fit: cover; border-radius: 8px; margin-bottom: 25px; }
        .post-content-text { font-size: 19px; line-height: 1.9; color: #222; }
        .sidebar { background: var(--white); padding: 20px; border-radius: 8px; height: fit-content; position: sticky; top: 120px; border: 1px solid #eee; }
        footer { background: var(--dark); color: #bbb; padding: 50px 0 20px; margin-top: 50px; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; }
        .footer-bottom { border-top: 1px solid #333; padding-top: 20px; text-align: center; font-size: 14px; margin-top: 20px; }
        .loader { text-align: center; padding: 100px; font-size: 1.2rem; }
        @media (max-width: 950px) { .post-layout { grid-template-columns: 1fr; } .sidebar { position: static; margin-top: 30px; } }
    </style>
</head>
<body>

<header class='header-2-wrapper'>
    <div class='h2-branding'>
        <div class='h2-container h2-brand-flex'>
            <div class='h2-brand-left'>
                <div class='h2-date-box'><div id='h2-nepali-date'>मिति लोड हुँदै...</div></div>
            </div>
            <div class='h2-logo'>
                <a href='#' onclick="App.goHome(); return false;">
                    <h2 style="color:#e31e24; margin:0; font-weight:bold;">SUBHLABH</h2>
                </a>
            </div>
            <div class='h2-brand-right'><i class='fa-solid fa-magnifying-glass'></i></div>
        </div>
    </div>
    <nav class='h2-nav-bar'>
        <div class='h2-container h2-nav-flex'>
            <ul class='h2-main-menu'>
                <li><a href='#' onclick="App.goHome(); return false;"><i class='fa-solid fa-house'></i></a></li>
                <li><a href='#' onclick="App.filterByCategory('समाचार'); return false;">समाचार</a></li>
                <li><a href='#' onclick="App.filterByCategory('अर्थतन्त्र'); return false;">अर्थतन्त्र</a></li>
                <li><a href='#' onclick="App.filterByCategory('खेलकुद'); return false;">खेलकुद</a></li>
            </ul>
        </div>
    </nav>
</header>

<main class="container" id="main-content">
    <div class="loader"><i class="fas fa-spinner fa-spin"></i> लोड हुँदैछ...</div>
</main>

<footer>
    <div class="container">
        <div class="footer-grid">
            <div><h2 style="color:var(--primary);">SUBHLABH</h2><p>सत्य र निष्पक्ष समाचारको लागि।</p></div>
            <div><h3 style="color:white">सम्पर्क</h3><p>info@subhlabh.com</p></div>
        </div>
        <div class="footer-bottom"><p>&copy; 2026 SubhLabh News. सर्वाधिकार सुरक्षित।</p></div>
    </div>
</footer>

<script src='https://cdn.jsdelivr.net/gh/designers2077/code/header-2.js' type='text/javascript'></script>

<script>
    const App = {
        CONFIG: {
            BLOG_ID: '4810240129416724295',
            API_KEY: 'AIzaSyDFoCQMjO-uLxIEAKdqCpLCzGt1AIviqEw',
            BASE_URL: 'https://www.googleapis.com/blogger/v3/blogs/',
            PLACEHOLDER: 'https://blogger.googleusercontent.com/img/a/AVvXsEgYs0647clgoWQC3ORQwtqpad0VDIrBI79h63NovgIKr29srh_C19HJk7OCbTquzxfofL7huTIp7wDCgE9W9fo_cmqE31j8GIm9B6ePJZU1pAEa5pnfTl7aB27FJjw7Vo8gk0327lNtNrurlgqSpRwSRRQIpC4gVvN9KdgtsDoXDYM8ZdfNB-IYHSmiaw=s1600'
        },

        init() {
            window.onpopstate = () => this.handleRouting();
            this.handleRouting();
        },

        utils: {
            getThumbnail(content) {
                const match = content.match(/<img[^>]+src="([^">]+)"/);
                let img = match ? match[1].replace('/s72-c/', '/s1200/').replace('/s1600/', '/s1200/') : App.CONFIG.PLACEHOLDER;
                // Force HTTPS for Facebook compliance
                return img.startsWith('http://') ? img.replace('http://', 'https://') : img;
            },
            formatDate(dateStr) {
                return new Date(dateStr).toLocaleDateString('ne-NP', { year: 'numeric', month: 'long', day: 'numeric' });
            },
            // Multi-function: Updates all meta data and ensures FB dimensions are set
            updateMeta(title, desc, img, url) {
                document.title = title;
                const cleanDesc = desc.replace(/<[^>]*>/g, '').substring(0, 160) + '...';
                
                document.getElementById('og-title').setAttribute('content', title);
                document.getElementById('og-description').setAttribute('content', cleanDesc);
                document.getElementById('og-image').setAttribute('content', img);
                document.getElementById('og-url').setAttribute('content', url);
                
                // फेसबुकको "Asynchronously processed" एरर हटाउन यहाँ साइज फिक्स गरिएको छ
                const widthTag = document.querySelector('meta[property="og:image:width"]');
                const heightTag = document.querySelector('meta[property="og:image:height"]');
                if(widthTag) widthTag.setAttribute('content', '1200');
                if(heightTag) heightTag.setAttribute('content', '630');
            }
        },

        async handleRouting() {
            const params = new URLSearchParams(window.location.search);
            const postId = params.get('post');
            const category = params.get('label');
            postId ? this.loadSinglePost(postId) : this.loadNewsList(category || '');
        },

        async loadNewsList(label = '') {
            const contentArea = document.getElementById('main-content');
            contentArea.innerHTML = '<div class="loader">लोड हुँदैछ...</div>';
            let url = `${this.CONFIG.BASE_URL}${this.CONFIG.BLOG_ID}/posts?key=${this.CONFIG.API_KEY}&maxResults=12`;
            if (label) url += `&labels=${encodeURIComponent(label)}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                this.utils.updateMeta("SubhLabh News", "ताजा समाचार पोर्टल", this.CONFIG.PLACEHOLDER, window.location.href);
                
                let html = label ? `<div class="cat-title">${label}</div>` : '';
                html += '<div class="news-grid">';
                data.items.forEach(post => {
                    const img = this.utils.getThumbnail(post.content);
                    html += `
                        <article class="card" onclick="App.openPost('${post.id}')">
                            <img src="${img}" alt="${post.title}" loading="lazy">
                            <div class="card-body">
                                <div class="post-date"><i class="far fa-calendar-alt"></i> ${this.utils.formatDate(post.published)}</div>
                                <h3 class="card-title">${post.title}</h3>
                            </div>
                        </article>`;
                });
                contentArea.innerHTML = html + '</div>';
            } catch (e) { contentArea.innerHTML = '<div class="error-msg">डाटा लोड गर्न सकिएन।</div>'; }
        },

        async loadSinglePost(id) {
            const contentArea = document.getElementById('main-content');
            contentArea.innerHTML = '<div class="loader">समाचार खुल्दैछ...</div>';
            try {
                const res = await fetch(`${this.CONFIG.BASE_URL}${this.CONFIG.BLOG_ID}/posts/${id}?key=${this.CONFIG.API_KEY}`);
                const post = await res.json();
                const featuredImg = this.utils.getThumbnail(post.content);
                const currentUrl = window.location.href;

                this.utils.updateMeta(post.title, post.content, featuredImg, currentUrl);

                contentArea.innerHTML = `
                    <div class="post-layout">
                        <article class="post-main">
                            <header class="post-header">
                                <h1>${post.title}</h1>
                                <div class="post-meta-wrapper">
                                    <div class="author-info"><div class="author-img">SL</div>
                                        <div><div class="author-name">सुभलाभ ब्युरो</div><div class="post-date">${this.utils.formatDate(post.published)}</div></div>
                                    </div>
                                    <div class="share-icons">
                                        <button onclick="window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent('${currentUrl}'),'share','width=600,height=400')" class="share-btn bg-fb"><i class="fab fa-facebook-f"></i></button>
                                        <a href="https://api.whatsapp.com/send?text=${encodeURIComponent(post.title + ' ' + currentUrl)}" target="_blank" class="share-btn bg-wa"><i class="fab fa-whatsapp"></i></a>
                                        <a href="https://twitter.com/intent/tweet?url=${encodeURIComponent(currentUrl)}&text=${encodeURIComponent(post.title)}" target="_blank" class="share-btn bg-tw"><i class="fab fa-twitter"></i></a>
                                    </div>
                                </div>
                            </header>
                            <img src="${featuredImg}" class="featured-image">
                            <div class="post-content-text">${post.content.replace(/<img[^>]+>/i, '')}</div>
                        </article>
                        <aside class="sidebar"><h3>विज्ञापन</h3><div style="background:#eee; height:250px; display:flex; align-items:center; justify-content:center; color:#999;">३००x२५०</div></aside>
                    </div>`;
                window.scrollTo(0, 0);
            } catch (e) { contentArea.innerHTML = '<div class="error-msg">समाचार भेटिएन।</div>'; }
        },

        filterByCategory(label) {
            window.history.pushState({}, '', `${window.location.pathname}?label=${encodeURIComponent(label)}`);
            this.loadNewsList(label);
            window.scrollTo(0,0);
        },

        openPost(id) {
            window.history.pushState({}, '', `${window.location.pathname}?post=${id}`);
            this.loadSinglePost(id);
        },

        goHome() {
            window.history.pushState({}, '', window.location.pathname);
            this.loadNewsList();
            window.scrollTo(0,0);
        }
    };

    App.init();
</script>
</body>
</html>
