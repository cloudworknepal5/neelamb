<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मेरो फोटोशप</title>
    <style>
        @font-face {
            font-family: 'Deepmani';
            src: url('Deepmani.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); max-width: 1400px; width: 100%; box-sizing: border-box; }
        .header-title { font-family: 'Deepmani', sans-serif; color: #1a73e8; text-align: center; margin-bottom: 20px; font-size: 32px; }
        
        .upload-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .box { border: 2px dashed #cbd5e0; padding: 15px; border-radius: 10px; background: #f8fafc; text-align: center; transition: 0.3s; }
        .box:hover { border-color: #1a73e8; }
        
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #f1f3f4; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .full { grid-column: 1 / -1; }
        #captionInput { width: 100%; padding: 15px; border-radius: 8px; border: 2px solid #1a73e8; font-family: 'Deepmani', Arial, sans-serif; font-size: 24px; box-sizing: border-box; outline: none; }
        label { font-size: 11px; font-weight: bold; color: #4a5568; display: block; margin-bottom: 5px; text-transform: uppercase; }
        
        .inline-group { display: flex; align-items: center; gap: 8px; background: #fff; padding: 5px; border-radius: 8px; border: 1px solid #ddd; height: 35px; }
        input[type="range"], select, input[type="color"] { width: 100%; cursor: pointer; height: 35px; border-radius: 5px; border: 1px solid #ccc; background: white; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }

        .grid-mover { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 110px; margin: 0 auto; }
        .move-btn { background: #1a73e8; color: white; border: none; padding: 6px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        /* फ्लेक्सिबल क्यानभास कन्टेनर - कालो बोर्डर हटाइएको */
        #canvas-wrapper { 
            position: relative; 
            margin: 0 auto; 
            background: #fff; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            transition: all 0.4s ease-in-out; /* स्मूथ ट्रान्जिसन */
        }
        canvas { display: block; cursor: move; background: #fff; max-width: 100%; height: auto; }
        
        .kb-info { background: #fff3cd; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 13px; text-align: center; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; grid-column: 1 / -1; margin-top: 10px; }
        .btn { flex: 1; min-width: 160px; padding: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-save { background: #28a745; color: white; }
        .btn-save:hover { background: #218838; transform: translateY(-2px); }
        .btn-reset { background: #dc3545; color: white; }

        @media (max-width: 768px) { .card { padding: 15px; } }
    </style>
</head>
<body>

<div class="card">
    <h1 class="header-title">मेरो फोटोशप (Flexible UI)</h1>
    
    <div class="upload-section">
        <div class="box">
            <label>फोटोहरू (१-४ सम्म):</label>
            <input type="file" id="photoPicker" accept="image/*" multiple onchange="loadImages()">
        </div>
        <div class="box">
            <label>लोगो (PNG):</label>
            <input type="file" id="logoPicker" accept="image/*" onchange="loadLogo()">
        </div>
    </div>

    <div class="controls">
        <div class="full">
            <label>दिपमनी फन्टमा लेख्नुहोस् (अक्षर र लोगोलाई समातेर सार्नुहोस्):</label>
            <input type="text" id="captionInput" placeholder="n]Vg'xf];\ .." oninput="drawAll()">
        </div>
        
        <div>
            <label>फोटोको आकार (Adaptive):</label>
            <select id="canvasSize" onchange="changeCanvasSize()">
                <option value="1200x630">Facebook Post (1200x630)</option>
                <option value="1080x1350">Facebook Portrait (4:5)</option>
                <option value="1080x1080">WhatsApp / Insta Square (1:1)</option>
                <option value="1080x1920">Reels / Stories (9:16)</option>
                <option value="1280x720">YouTube Thumbnail (16:9)</option>
            </select>
        </div>

        <div>
            <label>अक्षर साइज: <span id="fSizeVal">45</span>px</label>
            <input type="range" id="fontSizeRange" min="10" max="250" value="45" oninput="drawAll()">
        </div>

        <div>
            <label>अक्षर र बोर्डर रङ:</label>
            <div class="inline-group">
                <input type="color" id="textColor" value="#ffffff" oninput="drawAll()" title="Main Text">
                <input type="color" id="textStrokeColor" value="#000000" oninput="drawAll()" title="Text Border">
            </div>
        </div>

        <div>
            <label>टेक्स्ट बोर्डर साइज: <span id="tStrokeVal">5</span>px</label>
            <input type="range" id="textStrokeRange" min="0" max="20" value="5" oninput="drawAll()">
        </div>

        <div>
            <label>फोटो बोर्डर रङ:</label>
            <div class="inline-group">
                <input type="checkbox" id="borderToggle" onchange="drawAll()">
                <input type="color" id="borderColor" value="#ffffff" oninput="drawAll()">
            </div>
        </div>

        <div>
            <label>फोटो बोर्डर: <span id="borderVal">10</span>px</label>
            <input type="range" id="borderRange" min="1" max="60" value="10" oninput="drawAll()">
        </div>

        <div style="text-align: center;">
            <label>कोठा सार्नुहोस्:</label>
            <div class="grid-mover">
                <div></div><button class="move-btn" onclick="swapGrid(-2)">▲</button><div></div>
                <button class="move-btn" onclick="swapGrid(-1)">◀</button>
                <button class="move-btn" style="background:#555">●</button>
                <button class="move-btn" onclick="swapGrid(1)">▶</button>
                <div></div><button class="move-btn" onclick="swapGrid(2)">▼</button><div></div>
            </div>
        </div>

        <div>
            <label>ब्राइटनेस: <span id="bVal">100</span>%</label>
            <input type="range" id="brightRange" min="30" max="200" value="100" oninput="drawAll()">
        </div>

        <div>
            <label>लोगो साइज: <span id="lSizeVal">100</span>px</label>
            <input type="range" id="logoSizeRange" min="20" max="600" value="100" oninput="drawAll()">
        </div>

        <div>
            <label>क्वालिटी (KB): <span id="qVal">85</span>%</label>
            <input type="range" id="qualityRange" min="10" max="100" value="85" oninput="drawAll()">
            <div id="kbDisplay" class="kb-info">साइज: -- KB</div>
        </div>

        <div class="btn-group">
            <button class="btn btn-save" onclick="downloadJPG()">फोटो डाउनलोड गर्नुहोस्</button>
            <button class="btn btn-reset" onclick="resetAll()">रिसेट गर्नुहोस्</button>
        </div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="mainCanvas"></canvas>
    </div>

    <footer style="text-align:center; color:#777; font-size:12px; margin-top:30px;">
        &copy; 2026 | <a href="https://neelamb.com" target="_blank" style="color:#1a73e8; text-decoration:none; font-weight:bold;">neelamb.com</a>
    </footer>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('canvas-wrapper');
    
    let CW = 1200, CH = 630;
    
    // इनिसियल साइज सेटिङ
    function initCanvas() {
        canvas.width = CW; canvas.height = CH;
        wrapper.style.width = "100%";
        wrapper.style.maxWidth = CW + "px";
        wrapper.style.aspectRatio = `${CW} / ${CH}`;
    }
    initCanvas();

    let imgObjects = [];
    let textObj = { text: "", x: CW/2, y: CH-80, isDragging: false };
    let logoObj = { img: null, x: 30, y: 30, w: 100, h: 100, isDragging: false };
    let selectedImgIdx = 0, isExporting = false, isDraggingImg = false, lastX, lastY;

    function changeCanvasSize() {
        const size = document.getElementById('canvasSize').value.split('x');
        CW = parseInt(size[0]); CH = parseInt(size[1]);
        
        canvas.width = CW; canvas.height = CH;
        // कन्टेनरलाई फ्लेक्सिबल बनाउने
        wrapper.style.maxWidth = CW + "px";
        wrapper.style.aspectRatio = `${CW} / ${CH}`;
        
        textObj.x = CW / 2; textObj.y = CH - 80; 
        refreshImageScaling(); drawAll();
    }

    function swapGrid(offset) {
        if (imgObjects.length < 2) return;
        let newIdx = Math.max(0, Math.min(imgObjects.length - 1, selectedImgIdx + offset));
        if (newIdx !== selectedImgIdx) {
            [imgObjects[selectedImgIdx], imgObjects[newIdx]] = [imgObjects[newIdx], imgObjects[selectedImgIdx]];
            selectedImgIdx = newIdx;
            refreshImageScaling(); drawAll();
        }
    }

    function refreshImageScaling() {
        imgObjects.forEach((obj) => {
            let cellW = CW, cellH = CH;
            if (imgObjects.length === 2) cellW = CW / 2;
            else if (imgObjects.length >= 3) { cellW = CW / 2; cellH = CH / 2; }
            obj.cellW = cellW; obj.cellH = cellH;
            obj.scale = Math.max(cellW / obj.img.width, cellH / obj.img.height);
        });
    }

    async function loadImages() {
        const files = document.getElementById('photoPicker').files;
        if (!files.length) return;
        imgObjects = [];
        for (let i = 0; i < Math.min(files.length, 4); i++) {
            const img = await new Promise(res => {
                const im = new Image();
                im.onload = () => res(im);
                im.src = URL.createObjectURL(files[i]);
            });
            imgObjects.push({ img, x: 0, y: 0, cellW: 0, cellH: 0, scale: 1 });
        }
        selectedImgIdx = 0; refreshImageScaling(); drawAll();
    }

    function loadLogo() {
        const file = document.getElementById('logoPicker').files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => { logoObj.img = img; drawAll(); };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function drawAll() {
        document.getElementById('bVal').innerText = document.getElementById('brightRange').value;
        document.getElementById('fSizeVal').innerText = document.getElementById('fontSizeRange').value;
        document.getElementById('qVal').innerText = document.getElementById('qualityRange').value;
        document.getElementById('borderVal').innerText = document.getElementById('borderRange').value;
        document.getElementById('tStrokeVal').innerText = document.getElementById('textStrokeRange').value;
        document.getElementById('lSizeVal').innerText = document.getElementById('logoSizeRange').value;

        ctx.clearRect(0, 0, CW, CH);
        ctx.fillStyle = "#ffffff"; ctx.fillRect(0,0, CW, CH);
        
        const hasBorder = document.getElementById('borderToggle').checked;
        const bColor = document.getElementById('borderColor').value;
        const bSize = parseInt(document.getElementById('borderRange').value);

        imgObjects.forEach((obj, i) => {
            let dx = 0, dy = 0;
            if (imgObjects.length === 2) dx = i * obj.cellW;
            else if (imgObjects.length >= 3) { dx = (i % 2) * obj.cellW; dy = Math.floor(i / 2) * obj.cellH; }
            
            ctx.save();
            if (hasBorder) { ctx.fillStyle = bColor; ctx.fillRect(dx, dy, obj.cellW, obj.cellH); }
            const offset = hasBorder ? bSize : 0;
            ctx.beginPath(); ctx.rect(dx + offset, dy + offset, obj.cellW - (offset*2), obj.cellH - (offset*2)); ctx.clip();
            ctx.filter = `brightness(${document.getElementById('brightRange').value}%)`;
            ctx.drawImage(obj.img, dx + obj.x, dy + obj.y, obj.img.width * obj.scale, obj.img.height * obj.scale);
            if (!isExporting && selectedImgIdx === i) {
                ctx.strokeStyle = "#1a73e8"; ctx.lineWidth = 10;
                ctx.strokeRect(dx+5, dy+5, obj.cellW-10, obj.cellH-10);
            }
            ctx.restore();
        });

        if (logoObj.img) {
            const lSize = parseInt(document.getElementById('logoSizeRange').value);
            const ratio = logoObj.img.width / logoObj.img.height;
            logoObj.w = lSize; logoObj.h = lSize / ratio;
            ctx.drawImage(logoObj.img, logoObj.x, logoObj.y, logoObj.w, logoObj.h);
        }

        textObj.text = document.getElementById('captionInput').value;
        if (textObj.text) {
            const fSize = parseInt(document.getElementById('fontSizeRange').value);
            const tStroke = parseInt(document.getElementById('textStrokeRange').value);
            ctx.font = `bold ${fSize}px 'Deepmani'`; ctx.textAlign = "center";
            if (tStroke > 0) {
                ctx.lineWidth = tStroke;
                ctx.strokeStyle = document.getElementById('textStrokeColor').value;
                ctx.strokeText(textObj.text, textObj.x, textObj.y);
            }
            ctx.fillStyle = document.getElementById('textColor').value;
            ctx.fillText(textObj.text, textObj.x, textObj.y);
        }
        if (!isExporting) updateKBInfo();
    }

    function updateKBInfo() {
        const quality = document.getElementById('qualityRange').value / 100;
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        const kb = Math.round((dataUrl.length - 22) * 3 / 4 / 1024);
        document.getElementById('kbDisplay').innerText = `अनुमानित साइज: ${kb} KB`;
    }

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        const scaleX = CW / rect.width;
        const scaleY = CH / rect.height;
        return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
    }

    canvas.addEventListener('mousedown', (e) => {
        const pos = getMousePos(e); lastX = pos.x; lastY = pos.y;
        
        // १. टेक्स्ट ड्रगिङ्ग
        const fSize = parseInt(document.getElementById('fontSizeRange').value);
        const tWidth = ctx.measureText(textObj.text).width;
        if (pos.x > textObj.x - tWidth/2 && pos.x < textObj.x + tWidth/2 && pos.y > textObj.y - fSize && pos.y < textObj.y) {
            textObj.isDragging = true; return;
        }

        // २. लोगो ड्रगिङ्ग
        if (logoObj.img && pos.x > logoObj.x && pos.x < logoObj.x + logoObj.w && pos.y > logoObj.y && pos.y < logoObj.y + logoObj.h) {
            logoObj.isDragging = true; return;
        }

        // ३. फोटो ड्रगिङ्ग
        imgObjects.forEach((obj, i) => {
            let dx = 0, dy = 0;
            if (imgObjects.length === 2) dx = i * obj.cellW;
            else if (imgObjects.length >= 3) { dx = (i % 2) * obj.cellW; dy = Math.floor(i / 2) * obj.cellH; }
            if (pos.x >= dx && pos.x <= dx + obj.cellW && pos.y >= dy && pos.y <= dy + obj.cellH) {
                selectedImgIdx = i; isDraggingImg = true; drawAll();
            }
        });
    });

    window.addEventListener('mousemove', (e) => {
        if (!textObj.isDragging && !logoObj.isDragging && !isDraggingImg) return;
        const pos = getMousePos(e);
        const dx = pos.x - lastX; const dy = pos.y - lastY;
        
        if (textObj.isDragging) { textObj.x += dx; textObj.y += dy; }
        else if (logoObj.isDragging) { logoObj.x += dx; logoObj.y += dy; }
        else if (isDraggingImg) { imgObjects[selectedImgIdx].x += dx; imgObjects[selectedImgIdx].y += dy; }
        
        lastX = pos.x; lastY = pos.y; drawAll();
    });

    window.addEventListener('mouseup', () => {
        textObj.isDragging = false; logoObj.isDragging = false; isDraggingImg = false;
    });

    function downloadJPG() {
        isExporting = true; drawAll(); 
        setTimeout(() => {
            const link = document.createElement('a');
            link.download = `Neelamb_Editor_${Date.now()}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', document.getElementById('qualityRange').value / 100);
            link.click();
            isExporting = false; drawAll();
        }, 100);
    }

    function resetAll() { if(confirm("सबै क्लियर गर्ने?")) location.reload(); }
    document.fonts.load("24px 'Deepmani'").then(() => drawAll());
</script>
</body>
</html>
