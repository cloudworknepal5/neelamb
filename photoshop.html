<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <title>My Photoshop</title>
    <style>
        @font-face {
            font-family: 'Deepmani';
            src: url('Deepmani.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #eceff1; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.15); 
            max-width: 1400px; 
            width: 100%; 
            text-align: center; 
            box-sizing: border-box;
        }
        .upload-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .box { border: 2px dashed #0984e3; padding: 15px; border-radius: 10px; background: #f0f7ff; }
        
        .controls { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
            background: #f1f2f6; 
            padding: 20px; 
            border-radius: 10px; 
            text-align: left; 
        }
        .full { grid-column: span 4; }
        #captionInput { 
            width: 100%; padding: 15px; border-radius: 8px; border: 2px solid #0984e3; 
            font-family: 'Deepmani', Arial, sans-serif; font-size: 26px; box-sizing: border-box; 
        }
        label { font-size: 12px; font-weight: bold; text-transform: uppercase; color: #636e72; display: block; margin-bottom: 5px; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; text-transform: none; font-size: 14px; margin-top: 5px; }
        input[type="range"], select, input[type="color"] { width: 100%; padding: 8px; cursor: pointer; }
        
        #canvas-wrapper { 
            position: relative; margin: 25px auto; background: #333;
            border: 8px solid #2d3436; width: fit-content; line-height: 0;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5); overflow: auto; max-width: 100%;
        }
        canvas { display: block; cursor: crosshair; background: #444; }
        .info-text { font-size: 13px; color: #2d3436; margin-bottom: 15px; background: #ffeaa7; padding: 10px; border-radius: 8px; display: inline-block; }
        
        .btn-group { display: flex; gap: 15px; grid-column: span 4; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-save { background: #00b894; color: white; }
        .btn-reset { background: #d63031; color: white; }

        /* फुटर स्टाइल */
        footer {
            margin-top: 30px;
            padding: 20px;
            color: #636e72;
            font-size: 14px;
            border-top: 1px solid #dfe6e9;
            width: 100%;
            max-width: 1400px;
            text-align: center;
        }
        footer a { color: #0984e3; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="font-family: 'Deepmani', sans-serif; color: #2d3436; margin-bottom: 10px;">मेरो फोटोशप</h1>
    <p class="info-text">🚀 <b>Quick Tips:</b> फेसबुक साइज डिफल्ट सेट गरिएको छ | फोटो साट्न <b>Double Click</b> गर्नुहोस् ।</p>
    
    <div class="upload-section">
        <div class="box">
            <label>फोटोहरू अपलोड (१-४ वटा):</label>
            <input type="file" id="photoPicker" accept="image/*" multiple onchange="loadImages()">
        </div>
        <div class="box">
            <label>लोगो अपलोड (PNG):</label>
            <input type="file" id="logoPicker" accept="image/*" onchange="loadLogo()">
        </div>
    </div>

    <div class="controls">
        <div class="full">
            <label>यहाँ टाइप गर्नुहोस् (दिपमनी फन्ट):</label>
            <input type="text" id="captionInput" placeholder="klkdf] k|of]u u/L n]Vg'xf];\ .." oninput="drawAll()">
        </div>
        
        <div>
            <label>इमेज साइज (Ratio):</label>
            <select id="canvasSize" onchange="changeCanvasSize()">
                <option value="1200x630">1200 x 630 (Facebook Standard)</option>
                <option value="600x315">600 x 315 (Facebook Small)</option>
                <option value="800x450">800 x 450 (Standard HD)</option>
                <option value="1200x800">1200 x 800 (Large)</option>
                <option value="700x350">700 x 350 (Banner)</option>
            </select>
        </div>

        <div>
            <label>बोर्डर सेटिङ (माथिल्लो तह):</label>
            <label class="checkbox-label">
                <input type="checkbox" id="showBorder" onchange="drawAll()"> बोर्डर देखाउने
            </label>
            <input type="range" id="borderSizeRange" min="1" max="60" value="5" oninput="drawAll()">
            <label style="text-transform: none; font-weight: normal;">साइज: <span id="borderSizeVal">5</span>px</label>
        </div>

        <div>
            <label>अक्षर साइज: <span id="fSizeVal">45</span>px</label>
            <input type="range" id="fontSizeRange" min="10" max="250" value="45" oninput="drawAll()">
        </div>

        <div>
            <label>ब्राइटनेस: <span id="bVal">100</span>%</label>
            <input type="range" id="brightRange" min="30" max="200" value="100" oninput="drawAll()">
        </div>

        <div>
            <label>अक्षरको रङ:</label>
            <input type="color" id="textColor" value="#ffffff" oninput="drawAll()">
        </div>

        <div>
            <label>लोगो साइज: <span id="lSizeVal">100</span>px</label>
            <input type="range" id="logoSizeRange" min="20" max="600" value="100" oninput="drawAll()">
        </div>

        <div class="btn-group">
            <button class="btn btn-save" onclick="downloadJPG()">फोटो डाउनलोड गर्नुहोस्</button>
            <button class="btn btn-reset" onclick="resetAll()">सबै रिसेट गर्नुहोस्</button>
        </div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="mainCanvas"></canvas>
    </div>

    <footer>
        &copy; 2026 सर्वाधिकार सुरक्षित | डिजाइन तथा विकास: <a href="https://neelamb.com" target="_blank">neelamb.com</a>
    </footer>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    
    // डिफल्ट साइज १२४०x६३० बनाइएको छ
    let CW = 1200, CH = 630;
    canvas.width = CW; canvas.height = CH;

    let imgObjects = [];
    let textObj = { text: "", x: CW/2, y: CH-70, isDragging: false };
    let logoObj = { img: null, x: 20, y: 20, w: 100, h: 100, isDragging: false };
    let isDraggingImg = false, selectedImgIdx = -1, startX, startY;
    let swapSourceIdx = -1;

    function changeCanvasSize() {
        const size = document.getElementById('canvasSize').value.split('x');
        CW = parseInt(size[0]); CH = parseInt(size[1]);
        canvas.width = CW; canvas.height = CH;
        textObj.x = CW / 2; textObj.y = CH - 70;
        refreshImageScaling();
        drawAll();
    }

    function refreshImageScaling() {
        imgObjects.forEach((obj, i) => {
            let cellW = CW, cellH = CH;
            if (imgObjects.length === 2) cellW = CW / 2;
            else if (imgObjects.length >= 3) { cellW = CW / 2; cellH = CH / 2; }
            obj.cellW = cellW; obj.cellH = cellH;
            obj.scale = Math.max(cellW / obj.img.width, cellH / obj.img.height);
        });
    }

    async function loadImages() {
        const files = document.getElementById('photoPicker').files;
        if (!files.length) return;
        imgObjects = [];
        const count = Math.min(files.length, 4);
        for (let i = 0; i < count; i++) {
            const img = await new Promise(res => {
                const im = new Image();
                im.onload = () => res(im);
                im.src = URL.createObjectURL(files[i]);
            });
            imgObjects.push({ img, x: 0, y: 0, cellW: 0, cellH: 0, scale: 1 });
        }
        refreshImageScaling();
        drawAll();
    }

    function loadLogo() {
        const file = document.getElementById('logoPicker').files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => { logoObj.img = img; drawAll(); };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function drawAll() {
        const bSize = parseInt(document.getElementById('borderSizeRange').value);
        document.getElementById('borderSizeVal').innerText = bSize;
        document.getElementById('bVal').innerText = document.getElementById('brightRange').value;
        document.getElementById('fSizeVal').innerText = document.getElementById('fontSizeRange').value;
        document.getElementById('lSizeVal').innerText = document.getElementById('logoSizeRange').value;
        const hasBorder = document.getElementById('showBorder').checked;

        ctx.clearRect(0, 0, CW, CH);
        
        imgObjects.forEach((obj, i) => {
            let dx = 0, dy = 0;
            if (imgObjects.length === 2) dx = i * obj.cellW;
            else if (imgObjects.length >= 3) { dx = (i % 2) * obj.cellW; dy = Math.floor(i / 2) * obj.cellH; }
            
            ctx.save();
            ctx.beginPath(); ctx.rect(dx, dy, obj.cellW, obj.cellH); ctx.clip();
            ctx.filter = `brightness(${document.getElementById('brightRange').value}%)`;
            ctx.drawImage(obj.img, dx + obj.x, dy + obj.y, obj.img.width * obj.scale, obj.img.height * obj.scale);
            
            if(swapSourceIdx === i) {
                ctx.strokeStyle = "#2ecc71";
                ctx.lineWidth = 10;
                ctx.strokeRect(dx+5, dy+5, obj.cellW-10, obj.cellH-10);
            }
            ctx.restore();
        });

        if (logoObj.img) {
            const lSize = document.getElementById('logoSizeRange').value;
            const ratio = logoObj.img.width / logoObj.img.height;
            logoObj.w = lSize; logoObj.h = lSize / ratio;
            ctx.drawImage(logoObj.img, logoObj.x, logoObj.y, logoObj.w, logoObj.h);
        }

        textObj.text = document.getElementById('captionInput').value;
        if (textObj.text) {
            const fSize = parseInt(document.getElementById('fontSizeRange').value);
            ctx.font = `${fSize}px 'Deepmani'`;
            ctx.textAlign = "center";
            ctx.lineWidth = fSize/5;
            ctx.strokeStyle = "black";
            ctx.strokeText(textObj.text, textObj.x, textObj.y);
            ctx.fillStyle = document.getElementById('textColor').value;
            ctx.fillText(textObj.text, textObj.x, textObj.y);
        }

        if (hasBorder) {
            ctx.strokeStyle = "black";
            ctx.lineWidth = bSize;
            ctx.strokeRect(bSize/2, bSize/2, CW - bSize, CH - bSize);
            if (imgObjects.length === 2) {
                ctx.beginPath(); ctx.moveTo(CW/2, 0); ctx.lineTo(CW/2, CH); ctx.stroke();
            } else if (imgObjects.length >= 3) {
                ctx.beginPath(); ctx.moveTo(CW/2, 0); ctx.lineTo(CW/2, CH); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, CH/2); ctx.lineTo(CW, CH/2); ctx.stroke();
            }
        }
    }

    canvas.ondblclick = (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (CW / rect.width);
        const my = (e.clientY - rect.top) * (CH / rect.height);
        imgObjects.forEach((obj, i) => {
            let dx = 0, dy = 0;
            if (imgObjects.length === 2) dx = i * obj.cellW;
            else if (imgObjects.length >= 3) { dx = (i % 2) * obj.cellW; dy = Math.floor(i / 2) * obj.cellH; }
            if (mx >= dx && mx <= dx + obj.cellW && my >= dy && my <= dy + obj.cellH) {
                swapSourceIdx = i; drawAll();
            }
        });
    };

    canvas.onmousedown = (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (CW / rect.width);
        const my = (e.clientY - rect.top) * (CH / rect.height);

        if (swapSourceIdx !== -1) {
            let targetIdx = -1;
            imgObjects.forEach((obj, i) => {
                let dx = 0, dy = 0;
                if (imgObjects.length === 2) dx = i * obj.cellW;
                else if (imgObjects.length >= 3) { dx = (i % 2) * obj.cellW; dy = Math.floor(i / 2) * obj.cellH; }
                if (mx >= dx && mx <= dx + obj.cellW && my >= dy && my <= dy + obj.cellH) targetIdx = i;
            });
            if (targetIdx !== -1) {
                let temp = imgObjects[swapSourceIdx];
                imgObjects[swapSourceIdx] = imgObjects[targetIdx];
                imgObjects[targetIdx] = temp;
                swapSourceIdx = -1;
                refreshImageScaling(); drawAll(); return;
            }
        }

        if (logoObj.img && mx > logoObj.x && mx < logoObj.x + logoObj.w && my > logoObj.y && my < logoObj.y + logoObj.h) {
            logoObj.isDragging = true;
        } else {
            const tWidth = ctx.measureText(textObj.text).width;
            const fSize = parseInt(document.getElementById('fontSizeRange').value);
            if (mx > textObj.x - tWidth/2 - 20 && mx < textObj.x + tWidth/2 + 20 && my > textObj.y - fSize && my < textObj.y + 20) {
                textObj.isDragging = true;
            } else {
                imgObjects.forEach((obj, i) => {
                    let dx = 0, dy = 0;
                    if (imgObjects.length === 2) dx = i * obj.cellW;
                    else if (imgObjects.length >= 3) { dx = (i % 2) * obj.cellW; dy = Math.floor(i / 2) * obj.cellH; }
                    if (mx >= dx && mx <= dx + obj.cellW && my >= dy && my <= dy + obj.cellH) selectedImgIdx = i;
                });
                isDraggingImg = true;
            }
        }
        startX = mx; startY = my;
    };

    window.onmousemove = (e) => {
        if (!logoObj.isDragging && !textObj.isDragging && (!isDraggingImg || selectedImgIdx === -1)) return;
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (CW / rect.width);
        const my = (e.clientY - rect.top) * (CH / rect.height);
        const dx = mx - startX, dy = my - startY;

        if (logoObj.isDragging) { logoObj.x += dx; logoObj.y += dy; }
        else if (textObj.isDragging) { textObj.x += dx; textObj.y += dy; }
        else if (imgObjects[selectedImgIdx]) { 
            imgObjects[selectedImgIdx].x += dx; 
            imgObjects[selectedImgIdx].y += dy; 
        }
        startX = mx; startY = my; drawAll();
    };

    window.onmouseup = () => { logoObj.isDragging = false; textObj.isDragging = false; isDraggingImg = false; selectedImgIdx = -1; };

    function downloadJPG() {
        const link = document.createElement('a');
        link.download = `Photo_Edit_${Date.now()}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.98);
        link.click();
    }

    function resetAll() { if(confirm("सबै सेटिङ रिसेट गर्ने?")) location.reload(); }
    document.fonts.load("24px 'Deepmani'").then(() => drawAll());
</script>
</body>
</html>
