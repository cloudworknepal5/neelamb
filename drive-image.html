<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election update</title>
    <style>
        :root { 
            --primary: #007bff; --success: #28a745; --danger: #dc3545; --bg: #f4f7f6; 
            --card: #ffffff; --text: #1c1e21; --border: #ddd;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 10px; 
            font-family: 'Segoe UI', sans-serif; 
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* Responsive Grid Logic */
        .drive-grid { 
            display: grid; 
            gap: 20px; 
            grid-template-columns: 1fr; /* मोबाइलमा १ कोलम */
            justify-items: center;
        }

        /* ट्याब्लेट र डेस्कटपको लागि ३ कोलम */
        @media (min-width: 768px) {
            .drive-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .file-card { 
            background: var(--card); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid var(--border); 
            width: 100%;
            max-width: 413px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .thumb { 
            width: 100%;
            aspect-ratio: 413 / 364; 
            background: #000; 
            overflow: hidden; 
        }

        .thumb img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }

        .info { padding: 12px; text-align: center; }
        .btn-group { display: flex; gap: 8px; justify-content: center; }
        
        .action-btn { 
            padding: 10px; 
            border-radius: 6px; 
            text-decoration: none; 
            color: white !important; 
            font-size: 13px; 
            font-weight: bold; 
            border: none; 
            cursor: pointer; 
            flex: 1; 
        }

        #load-more-btn { 
            padding: 12px 40px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: bold; 
            display: none; 
            margin: 30px auto; 
        }

        /* Bottom Upload Section */
        .upload-section {
            background: var(--card); 
            padding: 25px; 
            border-radius: 15px;
            margin: 50px 0 20px 0; 
            border: 2px dashed var(--border);
            text-align: center;
        }

        .btn-main { 
            padding: 12px 30px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 15px;
            width: 100%;
            max-width: 250px;
        }

        #status-msg { text-align: center; padding: 30px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="display-container" class="drive-grid"></div>
    
    <div style="text-align:center;">
        <button id="load-more-btn" onclick="renderBatch()">थप हेर्नुहोस् (Load More)</button>
    </div>

    <div id="status-msg">लोड हुँदैछन्...</div>

    <div class="upload-section">
        <h3 style="margin-top:0;">नयाँ फोटो अपलोड गर्नुहोस्</h3>
        <input type="file" id="file-input" accept="image/*" style="font-size: 14px;"><br>
        <button class="btn-main" onclick="handleUpload()">सर्भरमा पठाउनुहोस्</button>
        <div id="up-status" style="margin-top: 15px; font-weight: bold;"></div>
    </div>
</div>

<script>
/**
 * Multi-function logic [cite: 2026-03-06]:
 * १. sorting: .reverse() प्रयोग गरेर नयाँ फाइललाई माथि (Top) ल्याउने।
 * २. batching: ६ वटाको दरले रेन्डर गर्ने।
 * ३. responsiveness: मोबाइलमा १ कोलम र डेस्कटपमा ३ कोलम।
 */

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyrPPrq3PPqatYotrgDYomh-3V8F7HYteiVmcQh1Vt2lzpHRy2Z5vsXVseAcQq2sDRS/exec";
let allFiles = [], currentIndex = 0;
const BATCH_SIZE = 6; 

async function init() {
    try {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        
        // फाइलहरूलाई उल्टो क्रममा राख्ने (नयाँ अपलोड माथि ल्याउन)
        allFiles = data.reverse(); 
        
        document.getElementById('status-msg').style.display = 'none';
        renderBatch();
    } catch (e) { 
        document.getElementById('status-msg').innerHTML = "डाटा लोड गर्न सकिएन। SCRIPT_URL चेक गर्नुहोस्।"; 
    }
}

function getFullSizeUrl(id) {
    return `https://drive.google.com/uc?export=view&id=${id}`;
}

// १. ब्याच रेन्डरिंग फसन
function renderBatch() {
    const container = document.getElementById('display-container');
    const btn = document.getElementById('load-more-btn');
    const items = allFiles.slice(currentIndex, currentIndex + BATCH_SIZE);
    
    items.forEach(file => {
        const div = document.createElement('div');
        div.className = 'file-card';
        const fullImg = getFullSizeUrl(file.id);
        const backupThumb = `https://drive.google.com/thumbnail?id=${file.id}&sz=w1000`;

        div.innerHTML = `
            <div class="thumb">
                <img src="${fullImg}" onerror="this.src='${backupThumb}'" loading="lazy">
            </div>
            <div class="info">
                <div class="btn-group">
                    <a href="https://drive.google.com/uc?export=download&id=${file.id}" class="action-btn" style="background:var(--success)">डाउनलोड</a>
                    <button onclick="deleteFile('${file.id}', this)" class="action-btn" style="background:var(--danger)">डिलेट</button>
                </div>
            </div>`;
        container.appendChild(div);
    });

    currentIndex += BATCH_SIZE;
    btn.style.display = currentIndex < allFiles.length ? 'inline-block' : 'none';
    
    if(allFiles.length === 0) {
        document.getElementById('status-msg').style.display = 'block';
        document.getElementById('status-msg').innerHTML = "कुनै पनि फाइल भेटिएन।";
    }
}

// २. अपलोड फसन
async function handleUpload() {
    const input = document.getElementById('file-input');
    const status = document.getElementById('up-status');
    if (!input.files[0]) return alert("कृपया फोटो छान्नुहोस्!");
    
    const file = input.files[0];
    const reader = new FileReader();
    status.innerHTML = "⏳ अपलोड हुँदैछ... पेज रिफ्रेस नगर्नुहोस्।";
    status.style.color = "blue";

    reader.onload = async function(e) {
        const base64 = e.target.result.split(',')[1];
        try {
            await fetch(SCRIPT_URL, { 
                method: "POST", 
                mode: "no-cors", 
                body: JSON.stringify({ base64: base64, type: file.type, name: file.name }) 
            });
            status.innerHTML = "✅ सफल भयो! नयाँ फाइल माथि देखिनेछ।";
            status.style.color = "green";
            // नयाँ फाइल माथि देखाउन पेज रिफ्रेस गर्ने
            setTimeout(() => location.reload(), 1500);
        } catch (err) {
            status.innerHTML = "❌ त्रुटि भयो! फेरि प्रयास गर्नुहोस्।";
            status.style.color = "red";
        }
    };
    reader.readAsDataURL(file);
}

// ३. डिलेट फसन
async function deleteFile(id, btn) {
    const pass = prompt("मास्टर पासवर्ड हाल्नुहोस्:");
    if (!pass) return;
    btn.innerText = "...";
    try {
        await fetch(SCRIPT_URL, { 
            method: "POST", 
            mode: "no-cors", 
            body: JSON.stringify({ action: "delete", id: id, password: pass }) 
        });
        btn.closest('.file-card').remove();
    } catch (e) {
        alert("त्रुटि भयो!");
        btn.innerText = "डिलेट";
    }
}

window.onload = init;
</script>
</body>
</html>
