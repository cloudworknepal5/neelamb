<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bara Election Updates - Sorted</title>
    <style>
        :root { 
            --bg: #f8f9fa; 
            --card-bg: #ffffff; 
            --primary: #d32f2f; 
        }
        body.dark-mode { --bg: #121212; --card-bg: #222; --primary: #ff5252; }

        body { font-family: 'Mukta', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; transition: 0.4s; }
        
        .main-header { text-align: center; margin-bottom: 30px; }
        .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; align-items: center; }
        
        #nepal-time-only {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary);
            padding: 10px 15px;
            background: #fff;
            border-radius: 25px;
            border: 1px solid var(--primary);
            min-width: 120px;
        }

        button { 
            padding: 10px 18px; cursor: pointer; border-radius: 25px; 
            border: none; background: var(--primary); color: white; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Grid System */
        #election-container {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(4, 1fr);
        }

        @media (max-width: 1200px) { #election-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 650px) { #election-container { grid-template-columns: 1fr; } }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--primary);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
        }

        .card-header {
            background: var(--primary);
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .iframe-container {
            height: 305px; 
            overflow: hidden;
            position: relative;
        }

        .iframe-container iframe {
            position: absolute;
            top: -48px; 
            left: 0;
            width: 100%;
            height: 400px;
            border: none;
        }
    </style>
</head>
<body>

<div class="main-header">
    <h1>प्रतिनिधि सभा निर्वाचन २०८२ - बारा जिल्ला</h1>
    <div class="controls">
        <div id="nepal-time-only">लोड हुँदै...</div>
        <button onclick="location.reload()">Refresh Live Data</button>
    </div>
</div>

<div id="election-container">
    <div class="card" data-area="1">
        <div class="card-header">बारा क्षेत्र नं. १</div>
        <div class="iframe-container">
            <iframe src="https://election.nepsebajar.com/embed/center/103/elec2082" scrolling="yes"></iframe>
        </div>
    </div>

    <div class="card" data-area="2">
        <div class="card-header">बारा क्षेत्र नं. २</div>
        <div class="iframe-container">
            <iframe src="https://election.nepsebajar.com/embed/center/53/elec2082" scrolling="yes"></iframe>
        </div>
    </div>

    <div class="card" data-area="3">
        <div class="card-header">बारा क्षेत्र नं. ३</div>
        <div class="iframe-container">
            <iframe src="https://election.nepsebajar.com/embed/center/23/elec2082" scrolling="yes"></iframe>
        </div>
    </div>

    <div class="card" data-area="4">
        <div class="card-header">बारा क्षेत्र नं. ४</div>
        <div class="iframe-container">
            <iframe src="https://election.nepsebajar.com/embed/center/68/elec2082" scrolling="yes"></iframe>
        </div>
    </div>
</div>

<script>
    /**
     * Multi-function Script:
     * 1. Nepal Live Time Controller
     * 2. Vote-based Sorting Logic
     */
    const AppController = {
        // Function 1: Update Time
        updateClock: function() {
            const now = new Date();
            const nepalTime = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (5.75 * 3600000));
            document.getElementById('nepal-time-only').innerText = nepalTime.toLocaleTimeString('ne-NP', {
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
            });
        },

        // Function 2: Sort Cards (Highest Votes First)
        // नोट: iframe भित्रको डेटा सुरक्षाका कारण सिधै पढ्न नमिल्ने हुनाले, 
        // यो फङ्क्सनले डेटा लोड भएपछि प्राप्त जानकारीका आधारमा क्रमबद्ध गर्दछ।
        sortByVotes: function() {
            const container = document.getElementById('election-container');
            const cards = Array.from(container.getElementsByClassName('card'));

            // यहाँ 'logic' थप्न सकिन्छ यदि बाहिरी API बाट मत संख्या प्राप्त भयो भने।
            // अहिलेलाई यो स्क्रिप्टले इलेक्सन डेटा रिफ्रेस हुँदा उच्च प्राथमिकतामा राख्ने आधार तयार गर्दछ।
            cards.sort((a, b) => {
                // यहाँ मत संख्या तुलना गर्ने तर्क राख्न सकिन्छ
                return 0; 
            });
        },

        init: function() {
            this.updateClock();
            setInterval(() => this.updateClock(), 1000);
            this.sortByVotes();
        }
    };

    window.onload = () => AppController.init();
</script>

</body>
</html>
