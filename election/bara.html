<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal Election 2082</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Mukta', sans-serif; 
            margin: 0; padding: 5px; 
            max-height: 600px; overflow-y: auto; 
            background: #eee; 
        }

        /* १. सानो हेडर र रिफ्रेस सेक्सन */
        .mini-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #fff; padding: 4px 10px; border-radius: 5px; margin-bottom: 8px;
            border: 1px solid #d32f2f;
        }
        .mini-nav h1 { font-size: 0.9rem; margin: 0; color: #d32f2f; }
        .time-box { font-size: 0.75rem; font-weight: bold; }
        .ref-btn { 
            background: #d32f2f; color: #fff; border: none; 
            padding: 3px 8px; font-size: 0.7rem; border-radius: 3px; cursor: pointer;
        }

        /* २. निर्वाचन कार्ड ग्रिड */
        .grid { display: grid; gap: 8px; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
        .card { background: #fff; border: 1px solid #ccc; border-radius: 6px; overflow: hidden; }
        .card-label { background: #f8f8f8; font-size: 0.8rem; padding: 3px; text-align: center; border-bottom: 1px solid #ddd; font-weight: bold; }

        /* ३. 'पूरा नतिजा हेर्नुहोस्' लाई छोप्ने क्रपिङ म्याजिक */
        .crop-box {
            height: 235px; /* उचाइ घटाएर तलको भाग काटिएको */
            overflow: hidden;
            position: relative;
        }
        .crop-box iframe {
            position: absolute;
            top: -54px; /* माथिको भाग काट्न */
            left: 0;
            width: 100%;
            height: 330px; /* भित्री हाइट */
            border: none;
            pointer-events: none; /* भित्र क्लिक गर्न नमिल्ने बनाउन */
        }
    </style>
</head>
<body>

<div class="mini-nav">
    <h1>प्रतिनिधिसभा सदस्य निर्वाचन-२०८२, बारा </h1>
    <div id="nepal-time-only" class="time-box">...</div>
    <button class="ref-btn" onclick="location.reload()">Refresh</button>
</div>

<div class="grid">
    <div class="card"><div class="card-label">बारा क्षेत्र १</div><div class="crop-box"><iframe src="https://election.nepsebajar.com/embed/center/103/elec2082"></iframe></div></div>
    <div class="card"><div class="card-label">बारा क्षेत्र २</div><div class="crop-box"><iframe src="https://election.nepsebajar.com/embed/center/53/elec2082"></iframe></div></div>
    <div class="card"><div class="card-label">बारा क्षेत्र ३</div><div class="crop-box"><iframe src="https://election.nepsebajar.com/embed/center/23/elec2082"></iframe></div></div>
    <div class="card"><div class="card-label">बारा क्षेत्र ४</div><div class="crop-box"><iframe src="https://election.nepsebajar.com/embed/center/68/elec2082"></iframe></div></div>
</div>

<script>
    /**
     * Multi-function Script
     * १. समय नियन्त्रण (Nepal Time)
     * २. इन्टरफेेस अप्टिमाइजेसन
     */
    const App = {
        tick: function() {
            const now = new Date();
            const npt = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (5.75 * 3600000));
            document.getElementById('nepal-time-only').innerText = npt.toLocaleTimeString('ne-NP');
        },
        init: function() {
            this.tick();
            setInterval(() => this.tick(), 1000);
            console.log("View restricted to 600px. Links corrupted/hidden.");
        }
    };
    window.onload = () => App.init();
</script>

</body>
</html>
