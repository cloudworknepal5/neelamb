<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'w-accent': '#ff5722' },
                    animation: {
                        'sun-rotate': 'rotate-sun 15s linear infinite',
                        'star-blink': 'blink 2s ease-in-out infinite',
                        'rain-drop': 'fall 0.8s linear infinite',
                        'moon-glide': 'moon-move 20s ease-in-out infinite',
                    },
                    keyframes: {
                        'rotate-sun': { '0%': { transform: 'rotate(0deg) scale(1)' }, '50%': { transform: 'scale(1.2)' }, '100%': { transform: 'rotate(360deg) scale(1)' } },
                        'blink': { '0%, 100%': { opacity: 0.3 }, '50%': { opacity: 1 } },
                        'fall': { '0%': { transform: 'translateY(-10px)', opacity: 0 }, '50%': { opacity: 0.8 }, '100%': { transform: 'translateY(150px)', opacity: 0 } },
                        'moon-move': {
                            '0%': { transform: 'translateX(-20px) translateY(30px)', opacity: 0 },
                            '10%': { opacity: 0.8 },
                            '50%': { transform: 'translateX(220px) translateY(-20px)' },
                            '90%': { opacity: 0.8 },
                            '100%': { transform: 'translateX(320px) translateY(30px)', opacity: 0 }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .weather-bg { transition: all 1.2s ease-in-out; }
        .rain-layer span { position: absolute; width: 1px; height: 12px; background: white; opacity: 0.4; }
        .star-layer span { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; }
        .moon-obj { 
            position: absolute; width: 35px; height: 35px; background: #fdfdfd; 
            border-radius: 50%; box-shadow: 0 0 25px 8px rgba(255, 255, 255, 0.4); 
            filter: blur(0.5px);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-900"> <div id="main-card" class="w-[300px] h-[200px] border border-white/20 rounded-3xl flex flex-col overflow-hidden p-4 text-white relative weather-bg">
        
        <div id="rain-layer" class="absolute inset-0 pointer-events-none hidden rain-layer"></div>
        <div id="star-layer" class="absolute inset-0 pointer-events-none hidden star-layer"></div>
        <div id="moon-layer" class="absolute inset-0 pointer-events-none hidden">
            <div class="moon-obj animate-moon-glide"></div>
        </div>
        <div id="sun-layer" class="absolute -top-6 -right-6 w-24 h-24 bg-yellow-400/30 blur-2xl animate-sun-rotate hidden"></div>

        <div class="flex justify-between items-start z-10">
            <div>
                <div id="clock" class="text-2xl font-black tracking-tighter drop-shadow-md">00:00:00</div>
                <div id="en-date" class="text-[8px] uppercase tracking-widest text-white/50">-- ---, ----</div>
            </div>
            <div class="text-right">
                <p id="hub-city" class="text-[10px] font-bold truncate w-20 uppercase">Birgunj</p>
                <span id="hub-desc" class="text-[7px] text-w-accent font-black uppercase tracking-tighter">---</span>
            </div>
        </div>

        <div class="flex-1 flex items-center justify-center z-10">
            <div id="hub-temp" class="text-7xl font-black tracking-tighter drop-shadow-2xl">--°</div>
        </div>

        <div class="border-t border-white/10 pt-3 z-10">
            <div id="forecast-render" class="flex justify-between items-center px-1"></div>
        </div>
    </div>

    <script>
        const WeatherApp = {
            apiKey: "9c17c4095ee2a4042c26bbd4d4de1726",
            nepaliDays: ["आइतवार", "सोमवार", "मंगलवार", "बुधवार", "बिहीवार", "शुक्रवार", "शनिवार"],

            init: function() {
                this.updateClock();
                setInterval(() => this.updateClock(), 1000);
                this.autoDetect();
            },

            updateClock: function() {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', {hour12: false});
                document.getElementById('en-date').innerText = now.toLocaleDateString('en-US', {day: 'numeric', month: 'short', year: 'numeric'});
            },

            autoDetect: async function() {
                try {
                    const res = await fetch('https://ipapi.co/json/');
                    const data = await res.json();
                    this.fetchWeather(data.city || "Birgunj");
                } catch(e) { this.fetchWeather("Birgunj"); }
            },

            updateWeatherEffects: function(data) {
                const condition = data.weather[0].main.toLowerCase();
                const isDay = data.weather[0].icon.includes('d');
                const rain = document.getElementById('rain-layer');
                const stars = document.getElementById('star-layer');
                const moon = document.getElementById('moon-layer');
                const sun = document.getElementById('sun-layer');

                // Reset Effects
                [rain, stars, moon, sun].forEach(el => el.classList.add('hidden'));
                rain.innerHTML = ''; stars.innerHTML = '';

                if (condition.includes('rain')) {
                    rain.classList.remove('hidden');
                    for(let i=0; i<25; i++) {
                        const s = document.createElement('span');
                        s.style.left = Math.random()*100+'%';
                        s.style.animationDelay = Math.random()*2+'s';
                        s.classList.add('animate-rain-drop');
                        rain.appendChild(s);
                    }
                } else if (condition.includes('clear')) {
                    if (isDay) {
                        sun.classList.remove('hidden');
                    } else {
                        moon.classList.remove('hidden');
                        stars.classList.remove('hidden');
                        for(let i=0; i<15; i++) {
                            const s = document.createElement('span');
                            s.style.left = Math.random()*100+'%';
                            s.style.top = Math.random()*100+'%';
                            s.style.animation = `blink ${Math.random()*2+1}s infinite`;
                            stars.appendChild(s);
                        }
                    }
                }
            },

            fetchWeather: async function(city) {
                try {
                    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${this.apiKey}&lang=ne`);
                    const data = await res.json();
                    this.updateWeatherEffects(data);
                    document.getElementById('hub-temp').innerText = Math.round(data.main.temp) + "°";
                    document.getElementById('hub-city').innerText = data.name;
                    document.getElementById('hub-desc').innerText = data.weather[0].description;
                    this.fetchForecast(city);
                } catch(err) { console.error(err); }
            },

            fetchForecast: async function(city) {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${this.apiKey}&lang=ne`);
                const data = await res.json();
                let html = '';
                for(let i = 0; i < data.list.length; i += 8) {
                    const d = data.list[i];
                    const day = this.nepaliDays[new Date(d.dt * 1000).getDay()].substring(0, 3);
                    html += `
                        <div class="flex flex-col items-center">
                            <span class="text-[7px] text-white/40 font-bold">${day}</span>
                            <span class="text-[10px] font-bold">${Math.round(d.main.temp)}°</span>
                        </div>`;
                }
                document.getElementById('forecast-render').innerHTML = html;
            }
        };

        window.onload = () => WeatherApp.init();
    </script>
</body>
</html>
