<div id="gh-outer-wrapper" style="width: 100%; overflow: hidden; display: flex; flex-direction: column; align-items: center; background: #f4f4f4; padding-bottom: 50px;">
    <div id="gh-master-container"></div>
</div>

<link href="https://fonts.googleapis.com/css2?family=Mukta:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
    /* 1. Preview & Scaling Logic */
    #gh-master-container {
        transform-origin: top center;
        transition: transform 0.2s ease-out;
        margin: 20px 0;
    }

    /* 2. Fixed News Card (Facebook Size) */
    .gh-master-wrap { 
        width: 1200px; height: 630px; 
        font-family: 'Mukta', sans-serif; text-align: center; 
        border: 15px solid #ed1c24; background: #fff; 
        box-sizing: border-box; position: relative;
        display: flex; flex-direction: column; justify-content: flex-start; 
        overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .gh-logo-watermark { 
        position: absolute; top: 30px; right: 25px; 
        width: 150px; height: auto; z-index: 100; 
        object-fit: contain;
    }

    .gh-img-frame { 
        position: relative; width: 100%; height: 430px; 
        background: #000; overflow: hidden; 
        display: flex; align-items: center; justify-content: center;
    }
    
    .gh-img-frame img { 
        width: 100%; height: 100%; 
        object-fit: cover; object-position: center;
    }

    .gh-red-overlay { 
        position: absolute; top: 12px; left: 12px; right: 12px; bottom: 12px; 
        border: 2px solid rgba(237, 28, 36, 0.4); z-index: 10; pointer-events: none; 
    }

    .gh-small-ribbon { 
        position: absolute; top: -10px; left: 50%; transform: translateX(-50%); 
        background: #ed1c24; color: #fff; padding: 3px 35px; 
        font-size: 16px; font-weight: 700; z-index: 20; border-radius: 3px; 
    }
    
    /* 3. Icons Styling */
    .gh-social-icons { 
        position: absolute; bottom: 5px; left: 20px; 
        display: flex; gap: 8px; z-index: 110; 
    }

    .gh-social-icons img, .icon-btn { 
        width: 38px; height: 38px; background: #fff; padding: 6px; 
        border-radius: 50%; border: 1px solid #ed1c24; 
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; color: #ed1c24; font-size: 18px; 
        pointer-events: auto; box-sizing: border-box;
    }

    .gh-headline { 
        flex-grow: 1; display: flex; align-items: center; justify-content: center;
        padding: 10px 40px; font-size: 52px; font-weight: 800; 
        color: #ed1c24; line-height: 1.1; margin: 0; text-align: center;
    }

    .gh-footer-strip { 
        background: #002e5b; color: #fff !important; 
        padding: 5px 60px; font-weight: 800; font-size: 22px; 
        border-radius: 5px 5px 0 0; width: fit-content; margin: 0 auto;
    }

    /* 4. Navigation Controls */
    .gh-nav-row { 
        display: flex; justify-content: center; gap: 15px; 
        margin: 20px 0; width: 100%;
    }

    .gh-nav-btn { 
        background: #ed1c24; color: #fff; padding: 12px 30px; 
        border: none; font-weight: bold; cursor: pointer; border-radius: 4px;
        font-size: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .gh-nav-btn:disabled { background: #ccc; cursor: not-allowed; }
</style>

<script>
let gh_posts_data = [];
let gh_current_idx = 0;
const SITE_DOMAIN = "nepaltopkhabar.com";
const SITE_LOGO_URL = "https://nepaltopkhabar.com/wp-content/uploads/2025/09/logo11-copy-300x84.png";
const YOUTUBE_CHANNEL_URL = "https://www.youtube.com/channel/UCfySzdquhwBDUKx1Aa5CU_w"; // eNepal Khabar Official

/**
 * Multi-Function 1: Dynamic Responsive Scaling
 */
function adjustScale() {
    const container = document.getElementById('gh-master-container');
    const availableWidth = window.innerWidth - 30;
    
    if (availableWidth < 1200) {
        const scale = availableWidth / 1200;
        container.style.transform = `scale(${scale})`;
        container.style.marginBottom = `-${630 * (1 - scale)}px`;
    } else {
        container.style.transform = `scale(1)`;
        container.style.marginBottom = `0px`;
    }
}

/**
 * Multi-Function 2: WhatsApp Sharing
 */
function shareWhatsApp() {
    const post = gh_posts_data[gh_current_idx];
    const text = `*${post.title.rendered}*\n\nपूरा विवरण यहाँ हेर्नुहोस्: https://${SITE_DOMAIN}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

/**
 * Multi-Function 3: YouTube Link
 */
function openYouTube() {
    window.open(YOUTUBE_CHANNEL_URL, '_blank');
}

/**
 * Multi-Function 4: High-Quality PNG Export
 */
async function capturePNG() {
    const target = document.querySelector('.gh-master-wrap');
    const downloadBtn = document.querySelector('.download-trigger');
    downloadBtn.style.visibility = "hidden";

    html2canvas(target, {
        useCORS: true,
        scale: 2,
        width: 1200,
        height: 630,
        backgroundColor: "#ffffff"
    }).then(canvas => {
        const link = document.createElement('a');
        link.download = `news-${Date.now()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
        downloadBtn.style.visibility = "visible";
    });
}

/**
 * Multi-Function 5: Image Security Wrapper
 */
function getSecureImg(url) {
    if(!url) return 'https://via.placeholder.com/1200x630?text=No+Image';
    return "https://images.weserv.nl/?url=" + encodeURIComponent(url.replace(/https?:\/\//, ""));
}

/**
 * Multi-Function 6: UI Renderer
 */
function updateDisplay() {
    const box = document.getElementById('gh-master-container');
    const p = gh_posts_data[gh_current_idx];
    if(!p) return;

    let featuredImg = '';
    if (p._embedded && p._embedded['wp:featuredmedia']) {
        featuredImg = p._embedded['wp:featuredmedia'][0].source_url;
    } else {
        const match = p.content.rendered.match(/<img[^>]+src="([^">]+)"/);
        featuredImg = match ? match[1] : '';
    }

    box.innerHTML = `
        <div class="gh-master-wrap">
            <img src="${getSecureImg(SITE_LOGO_URL)}" class="gh-logo-watermark" crossorigin="anonymous">
            <div class="gh-img-frame">
                <img src="${getSecureImg(featuredImg)}" crossorigin="anonymous">
                <div class="gh-red-overlay">
                    <div class="gh-small-ribbon">${SITE_DOMAIN}</div>
                </div>
                <div class="gh-social-icons">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" title="Facebook">
                    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" title="TikTok">
                    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" onclick="openYouTube()" title="YouTube Channel">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" onclick="shareWhatsApp()" title="Share to WhatsApp">
                    <div class="icon-btn download-trigger" onclick="capturePNG()"><i class="fas fa-download"></i></div>
                </div>
            </div>
            <div class="gh-headline">${p.title.rendered}</div>
            <div class="gh-footer-strip">पूरा विवरण कमेन्टमा लिंक गरिएको छ ।</div>
        </div>
        <div class="gh-nav-row">
            <button class="gh-nav-btn" onclick="move(-1)" ${gh_current_idx === 0 ? 'disabled' : ''}>← अघिल्लो</button>
            <button class="gh-nav-btn" onclick="move(1)" ${gh_current_idx === gh_posts_data.length - 1 ? 'disabled' : ''}>अर्को →</button>
        </div>
    `;
    adjustScale();
}

async function loadData() {
    try {
        const res = await fetch(`https://${SITE_DOMAIN}/wp-json/wp/v2/posts?_embed&per_page=20`);
        gh_posts_data = await res.json();
        if (gh_posts_data.length > 0) updateDisplay();
    } catch (err) { console.error("Load Error"); }
}

window.move = (n) => { gh_current_idx += n; updateDisplay(); };
window.addEventListener('resize', adjustScale);
loadData();
</script>
