<script type="text/javascript">

    var array_one = ["√І","ЋЬ",".","'m","]m","Fmf","Fm",")","!","@","#","$","%","^","&","*","(","k|m","em","km","Qm","qm","NЋЬ","¬°","¬Ґ","1","2","4",">","?","B","I","Q","√Я","q","вАЮ","вАє","вАҐ","вАЇ","¬І","¬∞","¬ґ","¬њ","√Е","√Л","√М","√Н","√О","√Э","√•","6¬Ђ","7¬Ђ","8¬Ђ","9¬Ђ","√Ш","|","8√Ю","9√Ю","S","s","V","v","U","u","¬£","3","¬™","R","r","5","H","h","вА∞","¬і","~", "`","6","7","8","9","0","T","t","Y","y","b","W","w","G","g","K","k","ЋЖ","A","a","E", "e","D","d","o","/","N","n","J", "j", "Z","z","i",":",";","X","x","cfвАШ","cвАШf","cf}","cf]","cf","c","O{","O","pm","p","C","P]","P","fвАШ","\"","'","+","f","[","\\","]","}","F", "L","M"];
    var array_two = ["а•Р","а§љ","а•§","m'","m]","mfF","mF","а•¶","а•І","а•®","а•©","а•™","а•Ђ","а•ђ","а•≠","а•Ѓ","а•ѓ","а§Ђа•На§∞","а§Э","а§Ђ","а§Ха•На§§","а§Ха•На§∞","а§≤","а§Ьа•На§Юа•Н","а§¶а•На§Ш","а§Ьа•На§Ю","а§¶а•На§¶","а§¶а•На§І","а§ґа•На§∞","а§∞а•Б","а§¶а•На§ѓ","а§Ха•На§Ја•Н","а§§а•На§§","а§¶а•На§Ѓ", "а§§а•На§∞","а§Іа•На§∞","а§Ща•На§Ш","а§°а•На§°","а§¶а•На§∞","а§Яа•На§Я","а§°а•На§Ґ","а§†а•На§†","а§∞а•В","а§єа•Г","а§Ща•На§Ч","а§§а•На§∞","а§Ща•На§Х","а§Ща•На§Х","а§Яа•На§†","а§¶а•На§µ","а§Яа•На§∞","а§†а•На§∞","а§°а•На§∞","а§Ґа•На§∞","а•На§ѓ","а•На§∞","а§°а§Љ","а§Ґа§Љ","а§Ха•Н","а§Х","а§Ца•Н","а§Ц","а§Ча•Н","а§Ч","а§Ша•Н","а§Ш", "а§Щ","а§Ъа•Н","а§Ъ","а§Ы","а§Ьа•Н","а§Ь","а§Эа•Н","а§Э","а§Юа•Н", "а§Ю","а§Я","а§†","а§°","а§Ґ","а§£а•Н","а§§а•Н","а§§","а§•а•Н","а§•","а§¶","а§Іа•Н","а§І","а§®а•Н","а§®","а§™а•Н","а§™","а§Ђа•Н","а§ђа•Н","а§ђ","а§≠а•Н","а§≠","а§Ѓа•Н","а§Ѓ","а§ѓ","а§∞","а§≤а•Н","а§≤","а§µа•Н","а§µ","а§ґа•Н","а§ґ","а§Ја•Н","а§Єа•Н","а§Є","а§єа•Н","а§є","а§С","а§С","а§Ф","а§У","а§Ж","а§Е","а§И","а§З","а§К","а§Й","а§Л","а§Р","а§П","а•Й","а•В","а•Б","а§В","а§Њ","а•Г","а•Н","а•З","а•И","а§Б","а•А","а§Г"];

    var input = document.getElementById("legacy_text").value;
    var unicode_text = input;

    // Basic Replacement Loop
    for (var i = 0; i < array_one.length; i++) {
