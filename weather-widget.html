<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { 
            --accent: #ff5722; 
            --bg-dark: #121212; 
        }

        /* मुख्य एम्बेड कन्टेनर - कुनै मार्जिन/प्याडिङ नभएको */
        .nb-weather-embed {
            position: relative;
            display: inline-flex;
            vertical-align: middle;
            margin: 0;
            padding: 0;
            z-index: 999999;
            line-height: normal;
        }

        /* १. ट्रिगर बटन (२०px हाइट र ४०px वाइड - No Padding) */
        .weather-trigger {
            display: flex; 
            align-items: center; 
            justify-content: center;
            cursor: pointer;
            background: #000; 
            border: 1px solid var(--accent);
            border-radius: 2px;
            height: 20px; 
            width: 40px; 
            box-sizing: border-box;
            margin: 0;
            padding: 0; /* प्याडिङ शून्य */
            overflow: hidden;
        }

        /* सानो अक्षरमा सहर र तापक्रम */
        .mini-info {
            font-size: 8px; 
            color: white;
            display: flex;
            flex-direction: column; /* माथि सहर, तल तापक्रम */
            line-height: 9px;
            text-align: center;
            font-weight: bold;
            font-family: sans-serif;
        }

        /* २. पपअप प्यानल */
        .weather-panel {
            display: none; 
            position: absolute; 
            top: 22px; 
            right: 0; /* मेनुको दायाँबाट खुल्ने */
            width: 250px; 
            height: 300px;
            border-radius: 8px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            background-color: var(--bg-dark); 
            border: 1px solid #fff;
            z-index: 999999;
            flex-direction: column;
            overflow: hidden;
        }

        .weather-panel.show { display: flex; }

        .overlay {
            flex: 1; 
            background: rgba(0,0,0,0.8);
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: white;
        }

        .clock { font-size: 1.5rem; font-weight: 800; margin: 0; }
        .hub-temp { font-size: 2.2rem; font-weight: 900; color: var(--accent); margin: 5px 0; }
        .hub-city { font-size: 0.9rem; margin: 0; font-weight: bold; }

        .forecast-grid {
            width: 100%; display: flex; justify-content: space-between;
            margin-top: auto; padding-top: 5px; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .f-day { font-size: 0.55rem; text-align: center; flex: 1; }
        .f-day img { width: 18px; }

        .close-btn { position: absolute; top: 2px; right: 8px; font-size: 18px; cursor: pointer; color: white; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="nb-weather-embed">
        <div class="weather-trigger" onclick="WeatherApp.toggle()">
            <div class="mini-info">
                <span id="m-city">--</span>
                <span id="m-temp" style="color:var(--accent)">--°</span>
            </div>
        </div>

        <div class="weather-panel" id="weather-popup">
            <span class="close-btn" onclick="WeatherApp.toggle()">&times;</span>
            <div class="overlay" id="popup-bg">
                <div class="clock" id="clock">00:00:00</div>
                <div class="hub-temp" id="hub-temp">--°</div>
                <p class="hub-city" id="hub-city">लोड हुँदै...</p>
                <div class="forecast-grid" id="forecast-render"></div>
            </div>
        </div>
    </div>

    <script>
        const WeatherApp = {
            apiKey: "9c17c4095ee2a4042c26bbd4d4de1726",
            
            init: function() {
                this.updateClock();
                setInterval(() => this.updateClock(), 1000);
                this.autoDetect();
            },

            autoDetect: async function() {
                try {
                    const res = await fetch('https://ipapi.co/json/');
                    const data = await res.json();
                    this.fetchWeather(data.city || "Birgunj");
                } catch(e) { this.fetchWeather("Birgunj"); }
            },

            fetchWeather: async function(city) {
                try {
                    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${this.apiKey}&lang=ne`);
                    const data = await res.json();
                    
                    // २०x४० को बटनमा अटाउन सहरको नाम ३ अक्षर मात्र
                    document.getElementById('m-city').innerText = data.name.substring(0, 3).toUpperCase();
                    document.getElementById('m-temp').innerText = Math.round(data.main.temp) + "°";

                    document.getElementById('hub-temp').innerText = Math.round(data.main.temp) + "°";
                    document.getElementById('hub-city').innerText = data.name;
                    
                    this.fetchForecast(city);
                } catch(err) { console.log(err); }
            },

            fetchForecast: async function(city) {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${this.apiKey}&lang=ne`);
                const data = await res.json();
                let html = '';
                for(let i = 0; i < data.list.length; i += 8) {
                    const d = data.list[i];
                    const day = new Date(d.dt * 1000).toLocaleDateString('ne-NP', {weekday: 'short'});
                    html += `<div class="f-day"><span>${day}</span><br><img src="https://openweathermap.org/img/wn/${d.weather[0].icon}.png"><br><b>${Math.round(d.main.temp)}°</b></div>`;
                }
                document.getElementById('forecast-render').innerHTML = html;
            },

            updateClock: function() {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', {hour12: false});
            },

            toggle: function() {
                const popup = document.getElementById('weather-popup');
                popup.classList.toggle('show');
            }
        };

        WeatherApp.init();
    </script>
</body>
</html>
