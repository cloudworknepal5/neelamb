<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal24News Weather Widget</title>
    
    <style>
        /* आधारभूत सेटिङ */
        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5; /* परिक्षणका लागि हल्का ब्याकग्राउन्ड */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* २० पिक्सेल उचाइको पारदर्शी विजेट */
        .n24-weather-box {
            display: inline-flex;
            align-items: center;
            height: 20px;
            overflow: hidden;
            background: transparent;
            color: #333; /* अक्षरको रङ (आवश्यकता अनुसार #fff राख्न सक्नुहुन्छ) */
            gap: 10px;
            min-width: 160px;
            border-left: 3px solid #e74c3c;
            padding-left: 8px;
            cursor: default;
        }

        .n24-city {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            color: #e74c3c;
            white-space: nowrap;
        }

        .n24-slider {
            position: relative;
            height: 20px;
            flex-grow: 1;
        }

        .n24-unit {
            position: absolute;
            height: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
            opacity: 0;
            transform: translateY(-20px);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
            white-space: nowrap;
        }

        .n24-unit.active {
            opacity: 1;
            transform: translateY(0);
        }

        .n24-unit.exit {
            opacity: 0;
            transform: translateY(20px);
        }

        .n24-day { font-size: 10px; opacity: 0.7; font-weight: bold; }
        .n24-temp { font-size: 12px; font-weight: 700; color: #007bff; }
    </style>
</head>
<body>

    <div class="n24-weather-box" id="n24-weather-container">
        <span class="n24-city" id="n24-city-display">पर्खनुहोस्...</span>
        <div class="n24-slider" id="n24-slide-wrapper">
            </div>
    </div>
    <script>
        /**
         * MULTI-FUNCTION WEATHER CONTROLLER
         * १. HTTPS सपोर्ट गर्ने IPAPI बाट सहर पत्ता लगाउँछ (No Popup)
         * २. Open-Meteo बाट ५ दिनको डाटा तान्छ
         * ३. माथिबाट तल स्लाइड हुने एनिमेसन दिन्छ
         */
        async function startSmartWeather() {
            const wrapper = document.getElementById('n24-slide-wrapper');
            const cityEl = document.getElementById('n24-city-display');

            try {
                // १. लोकेसन फेच (IP को आधारमा)
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                
                let lat = 27.01, lon = 84.87, city = "BIRGUNJ"; // फलब्याक

                if (ipData.latitude) {
                    lat = ipData.latitude;
                    lon = ipData.longitude;
                    city = ipData.city ? ipData.city.toUpperCase() : "NEPAL";
                }
                cityEl.innerText = city;

                // २. मौसम डाटा फेच
                const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max&timezone=auto`);
                const wData = await wRes.json();
                
                if (wData.daily) {
                    const days = ["आज", "भोलि", "पर्सि", "निर्सि", "कान्छि"];
                    wrapper.innerHTML = ""; 

                    // ३. युनिटहरू तयार गर्ने
                    wData.daily.temperature_2m_max.forEach((temp, i) => {
                        if(i > 4) return;
                        const code = wData.daily.weathercode[i];
                        
                        let icon = "☀️";
                        if (code >= 1 && code <= 3) icon = "⛅";
                        else if (code >= 51 && code <= 67) icon = "🌧️";
                        else if (code >= 95) icon = "⛈️";
                        
                        const div = document.createElement('div');
                        div.className = 'n24-unit';
                        div.innerHTML = `
                            <span class="n24-day">${days[i]}</span>
                            <span>${icon}</span>
                            <span class="n24-temp">${Math.round(temp)}°C</span>
                        `;
                        wrapper.appendChild(div);
                    });

                    // ४. भर्टिकल स्लाइडर एनिमेसन
                    let current = 0;
                    const slides = document.querySelectorAll('.n24-unit');
                    
                    function runSlide() {
                        slides.forEach(s => s.classList.remove('active', 'exit'));
                        
                        const prev = (current === 0) ? slides.length - 1 : current - 1;
                        slides[prev].classList.add('exit');
                        slides[current].classList.add('active');
                        
                        current = (current + 1) % slides.length;
                    }

                    runSlide();
                    setInterval(runSlide, 4000); // ४ सेकेन्डमा स्लाइड हुने
                }
            } catch (err) {
                cityEl.innerText = "OFFLINE";
                console.error("Fetch Error:", err);
            }
        }

        window.onload = startSmartWeather;
    </script>
</body>
</html>
