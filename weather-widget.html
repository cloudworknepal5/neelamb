<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <style>
        /* पारदर्शी र २०px उचाइ भएको विजेट */
        .weather-auto-no-popup {
            display: inline-flex;
            align-items: center;
            height: 20px;
            padding: 0;
            background: transparent;
            color: inherit;
            font-family: 'Segoe UI', sans-serif;
            gap: 5px;
            cursor: default;
            border: none;
        }

        #w-icon-smart { font-size: 14px; }
        #w-temp-smart { font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="weather-auto-no-popup" id="weather-box-smart">
        <span id="w-icon-smart">☀️</span>
        <span id="w-temp-smart">--°C</span>
    </div>

    <script>
        /**
         * MULTI-FUNCTION IP-BASED WEATHER
         * १. IP बाट लोकेसन पत्ता लगाउँछ (पप-अप विना)
         * २. लोकेसन अनुसार मौसमको डाटा तान्छ
         * ३. बीरगन्जलाई फलब्याक (Fallback) राख्छ
         */
        async function getIPWeather() {
            const tEl = document.getElementById('w-temp-smart');
            const iEl = document.getElementById('w-icon-smart');
            const box = document.getElementById('weather-box-smart');

            try {
                // १. IP बाट लोकेसन तान्ने (पप-अप नमाग्ने विधि)
                const ipRes = await fetch('http://ip-api.com/json/');
                const ipData = await ipRes.json();
                
                let lat = 27.01, lon = 84.87, city = "Birgunj"; // Default

                if (ipData.status === 'success') {
                    lat = ipData.lat;
                    lon = ipData.lon;
                    city = ipData.city;
                }

                // २. मौसम डाटा तान्ने
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const wData = await weatherRes.json();
                
                if (wData.current_weather) {
                    const temp = Math.round(wData.current_weather.temperature);
                    const code = wData.current_weather.weathercode;
                    
                    tEl.innerText = temp + "°C";
                    box.title = `${city}: ${temp}°C`;

                    // ३. स्मार्ट आइकन लजिक (Multi-function)
                    let icon = "☀️";
                    if (code >= 1 && code <= 3) icon = "⛅";
                    if (code >= 51 && code <= 67) icon = "🌧️";
                    if (code >= 95) icon = "⛈️";
                    
                    iEl.innerHTML = icon;
                }
            } catch (err) {
                console.log("IP Weather Error");
                tEl.innerText = "Err";
            }
        }

        // रन गर्ने
        getIPWeather();
        
        // प्रत्येक ३० मिनेटमा अपडेट
        setInterval(getIPWeather, 1800000);
    </script>

</body>
</html>
