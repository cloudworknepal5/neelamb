<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* नेभबारको आधारभूत स्टाइल */
        .custom-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            background: #1a1a1a; /* गाढा रङ */
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 40px;
        }

        /* वेदर स्लाइडर सेक्सन */
        .weather-nav-item {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            padding: 0 12px;
            border-radius: 50px;
            height: 28px;
        }

        .weather-vertical-slider {
            display: inline-flex;
            align-items: center;
            height: 20px;
            overflow: hidden;
            gap: 8px;
            min-width: 145px;
        }

        .city-tag {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            color: #ff4757;
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            padding-right: 8px;
            white-space: nowrap;
        }

        .slide-container {
            position: relative;
            height: 20px;
            flex-grow: 1;
        }

        /* एनिमेसन लजिक */
        .weather-unit {
            position: absolute;
            height: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            width: 100%;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(15px);
        }

        .weather-unit.active {
            opacity: 1;
            transform: translateY(0);
        }

        .weather-unit.exit {
            opacity: 0;
            transform: translateY(-15px);
        }

        .w-label { font-size: 10px; opacity: 0.8; font-weight: bold; color: #ced4da; }
        .w-temp { font-size: 12px; font-weight: 700; color: #00d2ff; }
        
        .nav-logo { font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <nav class="custom-navbar">
        <div class="nav-logo">My Website</div>
        
        <div class="weather-nav-item">
            <div class="weather-vertical-slider">
                <span class="city-tag" id="city-name">लोडिङ...</span>
                <div class="slide-container" id="slide-wrapper"></div>
            </div>
        </div>
    </nav>

    <script>
        async function startVerticalWeather() {
            const wrapper = document.getElementById('slide-wrapper');
            const cityEl = document.getElementById('city-name');

            let lat = 27.01, lon = 84.87, city = "BIRGUNJ";

            try {
                // १. IP बाट लोकेसन (HTTPS)
                const ipRes = await fetch('https://ipapi.co/json/');
                if (ipRes.ok) {
                    const ipData = await ipRes.json();
                    lat = ipData.latitude; 
                    lon = ipData.longitude; 
                    city = (ipData.city || "NEPAL").toUpperCase();
                }
            } catch (err) {
                console.warn("Location error, using default.");
            }

            cityEl.innerText = city;

            try {
                // २. मौसम डाटा
                const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max&timezone=auto`);
                const wData = await wRes.json();
                
                const days = ["आज", "भोलि", "पर्सि", "निर्सि", "कान्छि"];
                wrapper.innerHTML = ""; 

                // ३. HTML एलिमेन्ट निर्माण
                wData.daily.temperature_2m_max.forEach((temp, i) => {
                    if(i > 4) return;
                    const code = wData.daily.weathercode[i];
                    let icon = (code === 0) ? "☀️" : (code < 4) ? "⛅" : (code < 70) ? "🌧️" : "⛈️";
                    
                    const div = document.createElement('div');
                    div.className = 'weather-unit';
                    div.innerHTML = `
                        <span class="w-label">${days[i]}</span>
                        <span>${icon}</span>
                        <span class="w-temp">${Math.round(temp)}°C</span>
                    `;
                    wrapper.appendChild(div);
                });

                // ४. एनिमेसन लजिक (तपाईँले दिनुभएको लजिक अनुसार)
                const slides = document.querySelectorAll('.weather-unit');
                let currentIndex = 0;

                function rotateSlides() {
                    if (slides.length === 0) return;
                    slides.forEach((slide, index) => {
                        slide.classList.remove('active', 'exit');
                        if (index === currentIndex) {
                            slide.classList.add('active');
                        } else if (index === (currentIndex === 0 ? slides.length - 1 : currentIndex - 1)) {
                            slide.classList.add('exit');
                        }
                    });
                    currentIndex = (currentIndex + 1) % slides.length;
                }

                rotateSlides();
                setInterval(rotateSlides, 3500);

            } catch (e) {
                cityEl.innerText = "Error";
            }
        }

        window.addEventListener('load', startVerticalWeather);
    </script>

</body>
</html>
