<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeelamB Mini Weather Tool</title>
    <style>
        :root { 
            --accent: #ff5722; 
            --bg-dark: #121212; 
        }
        
        body { margin: 0; padding: 10px; font-family: 'Segoe UI', sans-serif; }

        /* मुख्य कन्टेनर */
        .nb-weather-embed {
            position: relative;
            display: inline-block;
            z-index: 999999; /* सबैभन्दा माथि */
        }

        /* १. ट्रिगर बटन (२०px हाइट र ४०px वाइड) */
        /* नोट: नाम र तापक्रम अटाउन विड्थलाई 'min-width: 40px' र अटोमा राखिएको छ */
        .weather-trigger {
            display: flex; 
            align-items: center; 
            cursor: pointer;
            background: #000; 
            border-radius: 4px;
            padding: 0 4px; 
            border: 1px solid var(--accent);
            height: 20px; /* तपाईंले भन्नुभएको हाइट */
            min-width: 40px; /* तपाईंले भन्नुभएको वाइड */
            box-sizing: border-box;
            color: white;
            overflow: hidden;
            transition: 0.2s;
        }

        .mini-info {
            font-size: 9px; /* सानो साइजमा हटाउन */
            white-space: nowrap;
            display: flex;
            gap: 3px;
            font-weight: bold;
        }

        /* २. पपअप प्यानल (Z-index उच्च राखिएको) */
        .weather-panel {
            display: none; 
            position: absolute; 
            top: 25px; 
            left: 0; 
            width: 260px; 
            height: 320px;
            border-radius: 10px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            background-color: var(--bg-dark); 
            border: 2px solid #fff;
            z-index: 999999; /* सबैभन्दा माथि */
            flex-direction: column;
            overflow: hidden;
            background-size: cover;
        }

        .weather-panel.show { display: flex; }

        .overlay {
            flex: 1; 
            background: rgba(0,0,0,0.7);
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: white;
        }

        .clock { font-size: 1.8rem; font-weight: 800; margin: 0; }
        .en-date { font-size: 0.7rem; opacity: 0.8; }

        .weather-main { margin: 15px 0; text-align: center; }
        .hub-temp { font-size: 2.5rem; font-weight: 900; color: var(--accent); }
        .hub-city { font-size: 1rem; margin: 0; font-weight: bold; }

        .forecast-grid {
            width: 100%; display: flex; justify-content: space-around;
            margin-top: auto; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.2);
        }
        .f-day { font-size: 0.6rem; text-align: center; }
        .f-day img { width: 20px; }

        .close-btn { position: absolute; top: 5px; right: 10px; font-size: 20px; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div class="nb-weather-embed">
        <div class="weather-trigger" onclick="WeatherApp.toggle()">
            <div class="mini-info">
                <span id="m-city">--</span>
                <span id="m-temp">--°</span>
            </div>
        </div>

        <div class="weather-panel" id="weather-popup">
            <span class="close-btn" onclick="WeatherApp.toggle()">&times;</span>
            <div class="overlay" id="popup-bg">
                <div class="clock" id="clock">00:00:00</div>
                <div class="en-date" id="en-date">-- ---, ----</div>
                
                <div class="weather-main">
                    <div class="hub-temp" id="hub-temp">--°</div>
                    <p class="hub-city" id="hub-city">लोड हुँदै...</p>
                    <span style="color:var(--accent); font-size: 0.8rem;" id="hub-desc">---</span>
                </div>

                <div class="forecast-grid" id="forecast-render"></div>
            </div>
        </div>
    </div>

    <script>
        const WeatherApp = {
            apiKey: "9c17c4095ee2a4042c26bbd4d4de1726",
            
            init: function() {
                this.updateClock();
                setInterval(() => this.updateClock(), 1000);
                this.autoDetect();
            },

            autoDetect: async function() {
                try {
                    const res = await fetch('https://ipapi.co/json/');
                    const data = await res.json();
                    this.fetchWeather(data.city || "Birgunj");
                } catch(e) { this.fetchWeather("Birgunj"); }
            },

            fetchWeather: async function(city) {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${this.apiKey}&lang=ne`);
                const data = await res.json();
                
                // बटनमा अपडेट
                document.getElementById('m-city').innerText = data.name.substring(0, 6); // नाम छोटो बनाउन
                document.getElementById('m-temp').innerText = Math.round(data.main.temp) + "°";

                // पपअपमा अपडेट
                document.getElementById('hub-temp').innerText = Math.round(data.main.temp) + "°";
                document.getElementById('hub-city').innerText = data.name;
                document.getElementById('hub-desc').innerText = data.weather[0].description;
                
                this.fetchForecast(city);
            },

            fetchForecast: async function(city) {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${this.apiKey}&lang=ne`);
                const data = await res.json();
                let html = '';
                for(let i = 0; i < data.list.length; i += 8) {
                    const d = data.list[i];
                    const day = new Date(d.dt * 1000).toLocaleDateString('ne-NP', {weekday: 'short'});
                    html += `<div class="f-day"><span>${day}</span><br><img src="https://openweathermap.org/img/wn/${d.weather[0].icon}.png"><br><b>${Math.round(d.main.temp)}°</b></div>`;
                }
                document.getElementById('forecast-render').innerHTML = html;
            },

            updateClock: function() {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', {hour12: false});
                document.getElementById('en-date').innerText = now.toLocaleDateString('en-US', {day: 'numeric', month: 'short', year: 'numeric'});
            },

            toggle: function() {
                const popup = document.getElementById('weather-popup');
                popup.classList.toggle('show');
            }
        };

        WeatherApp.init();
    </script>
</body>
</html>
