<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <style>
        /* १. मुख्य विजेट स्टाइल - No Padding/Margin */
        .nb-weather-widget {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #000; /* कालो ब्याकग्राउन्ड */
            border: 1px solid #ff5722; /* ओरेन्ज बोर्डर */
            border-radius: 2px;
            height: 40px; /* २० पिक्सल हाइट */
            min-width: 40px; /* न्युनतम ४० पिक्सल */
            width: auto; /* पूरा नाम अटाउन अटोमेटिक विड्थ */
            padding: 0 4px !important; /* दायाँ-बायाँ हल्का स्पेस ताकि अक्षर बोर्डरमा नटाँसियोस् */
            margin: 0 !important;  
            overflow: hidden;
            box-sizing: border-box;
            font-family: sans-serif;
            vertical-align: middle;
            line-height: normal;
        }

        /* अक्षरहरूको बनावट */
        .weather-info {
            font-size: 9px; 
            color: white;
            display: flex;
            align-items: center;
            gap: 4px; /* नाम र तापक्रम बीचको ग्याप */
            white-space: nowrap; /* नामलाई अर्को लाइनमा जान नदिन */
            font-weight: bold;
            padding: 0;
            margin: 0;
        }

        .temp-text {
            color: #ff5722; 
        }

        /* लोडिङ एनिमेसन (Optional) */
        .loading { opacity: 0.5; font-size: 7px; }
    </style>
</head>
<body>

    <div class="nb-weather-widget">
        <div class="weather-info" id="weather-content">
            <span class="loading">खोज्दै...</span>
        </div>
    </div>

    <script>
        const WeatherWidget = {
            apiKey: "9c17c4095ee2a4042c26bbd4d4de1726",
            
            init: function() {
                this.autoDetect();
                // हरेक ३० मिनेटमा अटो अपडेट
                setInterval(() => this.autoDetect(), 1800000);
            },

            // IP को आधारमा अटोमेटिक लोकेशन पत्ता लगाउने
            autoDetect: async function() {
                try {
                    const res = await fetch('https://ipapi.co/json/');
                    const data = await res.json();
                    if(data.city) {
                        this.fetchWeather(data.city);
                    } else {
                        throw new Error("Location not found");
                    }
                } catch(e) {
                    // यदि IP फेल भयो भने डिफल्ट Birgunj राख्ने
                    this.fetchWeather("Birgunj");
                }
            },

            // मौसम डाटा लिने
            fetchWeather: async function(city) {
                try {
                    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${this.apiKey}`);
                    const data = await res.json();
                    
                    const fullCityName = data.name; // पूरा नाम
                    const temperature = Math.round(data.main.temp);

                    // HTML अपडेट
                    document.getElementById('weather-content').innerHTML = `
                        <span id="widget-city">${fullCityName}</span>
                        <span id="widget-temp" class="temp-text">${temperature}°</span>
                    `;
                } catch(err) {
                    document.getElementById('weather-content').innerHTML = "Err";
                }
            }
        };

        // पेज लोड भएपछि सुरु गर्ने
        WeatherWidget.init();
    </script>

</body>
</html>
