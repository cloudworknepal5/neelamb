<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --accent: #ff5722; --bg: #121212; }
        
        /* १. ट्रिगर बटन (२०x४० पिक्सल - No Padding) */
        .weather-trigger {
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            cursor: pointer;
            background: #000; 
            border: 1px solid var(--accent);
            border-radius: 2px;
            height: 20px; 
            width: 40px; 
            padding: 0;
            margin: 0;
            overflow: hidden;
            position: relative;
            z-index: 999999;
        }

        .mini-info {
            font-size: 8px; 
            color: white;
            display: flex;
            flex-direction: column;
            line-height: 9px;
            text-align: center;
            font-weight: bold;
            font-family: sans-serif;
        }

        /* २. पपअप प्यानल (सिधै खुल्ने गरी सेट गरिएको) */
        .weather-panel {
            display: flex; /* सिधै देखिने बनाउन */
            position: fixed; /* वेबसाइटको अन्य एलिमेन्ट भन्दा माथि बस्न */
            top: 50px; 
            right: 20px; 
            width: 250px; 
            height: 300px;
            border-radius: 10px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            background-color: var(--bg); 
            border: 2px solid #fff;
            z-index: 1000000; /* सबैभन्दा उच्च प्रायोरिटी */
            flex-direction: column;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* बन्द गर्न मिल्ने अप्सन */
        .weather-panel.hide { display: none; }

        .overlay {
            flex: 1; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.9));
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: white;
        }

        .clock { font-size: 1.5rem; font-weight: 800; margin: 0; }
        .hub-temp { font-size: 2.5rem; font-weight: 900; color: var(--accent); margin: 5px 0; }
        .hub-city { font-size: 1rem; font-weight: bold; margin: 0; }

        .forecast-grid {
            width: 100%; display: flex; justify-content: space-between;
            margin-top: auto; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.2);
        }
        .f-day { font-size: 0.55rem; text-align: center; flex: 1; }
        .f-day img { width: 18px; }

        .close-btn { 
            position: absolute; top: 5px; right: 10px; 
            font-size: 20px; cursor: pointer; color: white; 
            background: rgba(255,255,255,0.1); border-radius: 50%; width: 25px; height: 25px;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="weather-trigger" onclick="WeatherApp.toggle()">
        <div class="mini-info">
            <span id="m-city">--</span>
            <span id="m-temp" style="color:var(--accent)">--°</span>
        </div>
    </div>

    <div class="weather-panel" id="weather-popup">
        <span class="close-btn" onclick="WeatherApp.toggle()">&times;</span>
        <div class="overlay" id="popup-bg">
            <div class="clock" id="clock">00:00:00</div>
            <div class="hub-temp" id="hub-temp">--°</div>
            <p class="hub-city" id="hub-city">लोड हुँदै...</p>
            <div class="forecast-grid" id="forecast-render"></div>
        </div>
    </div>

    <script>
        const WeatherApp = {
            apiKey: "9c17c4095ee2a4042c26bbd4d4de1726",
            
            init: function() {
                this.updateClock();
                setInterval(() => this.updateClock(), 1000);
                this.autoDetect();
            },

            autoDetect: async function() {
                try {
                    const res = await fetch('https://ipapi.co/json/');
                    const data = await res.json();
                    this.fetchWeather(data.city || "Birgunj");
                } catch(e) { this.fetchWeather("Birgunj"); }
            },

            fetchWeather: async function(city) {
                try {
                    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${this.apiKey}&lang=ne`);
                    const data = await res.json();
                    
                    document.getElementById('m-city').innerText = data.name.substring(0, 3).toUpperCase();
                    document.getElementById('m-temp').innerText = Math.round(data.main.temp) + "°";

                    document.getElementById('hub-temp').innerText = Math.round(data.main.temp) + "°";
                    document.getElementById('hub-city').innerText = data.name;
                    
                    this.fetchForecast(city);
                } catch(err) { console.log(err); }
            },

            fetchForecast: async function(city) {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${this.apiKey}&lang=ne`);
                const data = await res.json();
                let html = '';
                for(let i = 0; i < data.list.length; i += 8) {
                    const d = data.list[i];
                    const day = new Date(d.dt * 1000).toLocaleDateString('ne-NP', {weekday: 'short'});
                    html += `<div class="f-day"><span>${day}</span><br><img src="https://openweathermap.org/img/wn/${d.weather[0].icon}.png"><br><b>${Math.round(d.main.temp)}°</b></div>`;
                }
                document.getElementById('forecast-render').innerHTML = html;
            },

            updateClock: function() {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', {hour12: false});
            },

            toggle: function() {
                const popup = document.getElementById('weather-popup');
                // सुरुमा देखिने भएकोले 'hide' क्लासलाई टगल गर्ने
                popup.classList.toggle('hide');
            }
        };

        WeatherApp.init();
    </script>
</body>
</html>
