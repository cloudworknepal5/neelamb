<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <style>
        /* १. मुख्य विजेट स्टाइल (No Padding/Margin) */
        .nb-weather-widget {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #000; /* कालो ब्याकग्राउन्ड */
            border: 1px solid #ff5722; /* ओरेन्ज बोर्डर */
            border-radius: 2px;
            height: 20px; 
            width: 40px; 
            padding: 0;
            margin: 0;
            overflow: hidden;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            vertical-align: middle;
        }

        /* अक्षरहरूको बनावट */
        .weather-info {
            font-size: 8px; 
            color: white;
            display: flex;
            flex-direction: column;
            line-height: 8px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .temp-text {
            color: #ff5722; /* तापक्रमको रङ */
        }
    </style>
</head>
<body>

    <div class="nb-weather-widget">
        <div class="weather-info">
            <span id="widget-city">---</span>
            <span id="widget-temp" class="temp-text">--°</span>
        </div>
    </div>

    <script>
        const WeatherWidget = {
            apiKey: "9c17c4095ee2a4042c26bbd4d4de1726",
            
            init: function() {
                this.autoDetect();
                // हरेक १५ मिनेटमा अपडेट गर्ने
                setInterval(() => this.autoDetect(), 900000);
            },

            autoDetect: async function() {
                try {
                    // प्रयोगकर्ताको सहर पत्ता लगाउने
                    const res = await fetch('https://ipapi.co/json/');
                    const data = await res.json();
                    this.fetchWeather(data.city || "Birgunj");
                } catch(e) {
                    this.fetchWeather("Birgunj");
                }
            },

            fetchWeather: async function(city) {
                try {
                    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${this.apiKey}`);
                    const data = await res.json();
                    
                    // सहरको नामलाई ३ अक्षरमा खुम्च्याउने (जस्तै: BIR)
                    const cityName = data.name.substring(0, 3).toUpperCase();
                    const temperature = Math.round(data.main.temp);

                    document.getElementById('widget-city').innerText = cityName;
                    document.getElementById('widget-temp').innerText = temperature + "°";
                } catch(err) {
                    console.error("Weather update failed.");
                }
            }
        };

        // लोड भएपछि सुचारु गर्ने
        WeatherWidget.init();
    </script>

</body>
</html>
